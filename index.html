<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Jam Planner</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --panel-border: #262b36;
        --text: #e7e9ee;
        --text-dim: #9aa2b1;
        --accent: #6ee7b7;
        --accent-dim: #2e5a4a;
        --danger: #f87171;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      #root {
        width: 100%;
        max-width: 560px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 32px;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 4px;
      }
      .subtitle {
        color: var(--text-dim);
        font-size: 14px;
        margin: 0 0 24px;
      }
      button {
        font: inherit;
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid var(--panel-border);
        background: #1f232c;
        color: var(--text);
        padding: 10px 16px;
        transition: border-color 0.15s;
      }
      button:hover {
        border-color: var(--accent);
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .btn-primary {
        background: var(--accent);
        color: #0f1115;
        border-color: var(--accent);
        font-weight: 600;
        width: 100%;
        padding: 12px 16px;
      }
      .btn-primary:hover {
        filter: brightness(1.05);
      }
      .device-code {
        font-size: 32px;
        letter-spacing: 4px;
        font-weight: 700;
        text-align: center;
        background: #0f1115;
        border: 1px dashed var(--panel-border);
        border-radius: 8px;
        padding: 16px;
        margin: 20px 0;
        color: var(--accent);
      }
      .status-line {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 16px;
      }
      .spinner {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid var(--panel-border);
        border-top-color: var(--accent);
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .error-box {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid var(--danger);
        color: var(--danger);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 13px;
        margin-bottom: 16px;
      }
      .repo-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .repo-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        margin-bottom: 8px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .repo-item:hover {
        border-color: var(--accent);
        background: #1b1f27;
      }
      .repo-name {
        font-weight: 500;
      }
      .repo-meta {
        color: var(--text-dim);
        font-size: 12px;
        margin-top: 2px;
      }
      .badge {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        background: var(--accent-dim);
        color: var(--accent);
        white-space: nowrap;
      }
      .user-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
      }
      .user-row img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }
      .user-row .name {
        font-weight: 600;
        font-size: 14px;
      }
      .user-row .login {
        color: var(--text-dim);
        font-size: 12px;
      }
      .link-btn {
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 12px;
        padding: 4px;
        margin-left: auto;
      }
      .link-btn:hover {
        color: var(--text);
        border-color: transparent;
      }
      a.verify-link {
        color: var(--accent);
      }
      .empty-state {
        color: var(--text-dim);
        font-size: 13px;
        text-align: center;
        padding: 24px 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React 18 (UMD) + Babel standalone for in-browser JSX/TS. No build step. -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/plain" id="app-source">



      // =====================================================================
      // CONFIG
      // =====================================================================
      // Fill these in once you've registered a GitHub OAuth App with Device
      // Flow enabled (Settings > Developer settings > GitHub Apps > your app >
      // General > Enable Device Flow). CLIENT_ID is public and safe to ship
      // in this file.
      //
      // RELAY_BASE_URL points at a tiny stateless CORS relay, because GitHub's
      // /login/device/code and /login/oauth/access_token endpoints don't send
      // CORS headers, so a browser can't call them directly. The relay just
      // forwards the POST and adds `Access-Control-Allow-Origin: *` — it never
      // sees a client secret, since Device Flow doesn't use one.
      //
      // APP_SLUG is the dash-cased name shown in your GitHub App's public URL
      // (https://github.com/apps/<APP_SLUG>) — used to build the "install this
      // app on more repos" link, since GitHub Apps only see repos they've been
      // explicitly installed on.

      const CONFIG = {
        clientId: "Iv23lijW75Uw61RKbn2I",
        relayBaseUrl: "https://little-grass-e4c2gamejam-planner.justin-dean-young.workers.dev",
        appSlug: "little-grass-e4c2gamejam-planner",
        // Note: GitHub Apps don't use OAuth-style scopes — permissions are
        // configured on the app itself (Contents: Read & write, Metadata:
        // Read-only), not requested at login time. This is sent but ignored.
        scopes: [],
      };

      // =====================================================================
      // AUTH: types
      // =====================================================================
      const AuthStatus = {
        SignedOut: "signed-out",
        AwaitingDeviceCode: "awaiting-device-code",
        AwaitingUserVerification: "awaiting-user-verification",
        Polling: "polling",
        SignedIn: "signed-in",
        Error: "error",
      };

      const AuthErrorReason = {
        AccessDenied: "access-denied",
        Expired: "expired",
        NetworkError: "network-error",
        RelayUnavailable: "relay-unavailable",
        Unknown: "unknown",
      };

      // AuthenticatedUser shape: { login, name, avatarUrl, accessToken }

      // =====================================================================
      // AUTH: GitHub Device Flow, via plain fetch through the CORS relay
      // =====================================================================
      const SESSION_KEY = "gamejam-planner:github-session";

      class GitHubDeviceFlowAuth {
        state = { status: AuthStatus.SignedOut };
        listeners = new Set();
        pollAbort = null;

        onStateChange(listener) {
          this.listeners.add(listener);
          return () => this.listeners.delete(listener);
        }

        setState(next) {
          this.state = next;
          this.listeners.forEach((l) => l(next));
        }

        async restoreSession() {
          const raw = sessionStorage.getItem(SESSION_KEY);
          if (!raw) return null;
          try {
            const user = JSON.parse(raw);
            const ok = await this.verifyToken(user.accessToken);
            if (!ok) { sessionStorage.removeItem(SESSION_KEY); return null; }
            this.setState({ status: AuthStatus.SignedIn, user });
            return user;
          } catch {
            sessionStorage.removeItem(SESSION_KEY);
            return null;
          }
        }

        async login() {
          this.pollAbort?.abort();
          this.pollAbort = new AbortController();
          try {
            this.setState({ status: AuthStatus.AwaitingDeviceCode });
            const deviceCode = await this.requestDeviceCode();

            this.setState({
              status: AuthStatus.AwaitingUserVerification,
              userCode: deviceCode.user_code,
              verificationUri: deviceCode.verification_uri,
              verificationUriComplete: deviceCode.verification_uri_complete || deviceCode.verification_uri,
              expiresInSeconds: deviceCode.expires_in,
            });

            const accessToken = await this.pollForToken(deviceCode, this.pollAbort.signal);
            this.setState({ status: AuthStatus.Polling });

            const user = await this.fetchAuthenticatedUser(accessToken);
            sessionStorage.setItem(SESSION_KEY, JSON.stringify(user));
            this.setState({ status: AuthStatus.SignedIn, user });
            return user;
          } catch (err) {
            this.setState({ status: AuthStatus.Error, error: this.toAuthError(err) });
            throw err;
          }
        }

        logout() {
          this.pollAbort?.abort();
          sessionStorage.removeItem(SESSION_KEY);
          this.setState({ status: AuthStatus.SignedOut });
        }

        async requestDeviceCode() {
          const res = await fetch(`${CONFIG.relayBaseUrl}/login/device/code`, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify({ client_id: CONFIG.clientId, scope: CONFIG.scopes.join(" ") }),
          });
          if (!res.ok) throw new Error(`relay:Device code request failed (${res.status})`);
          return res.json();
        }

        async pollForToken(deviceCode, signal) {
          let intervalMs = Math.max(deviceCode.interval * 1000, 5000);
          const deadline = Date.now() + deviceCode.expires_in * 1000;

          while (Date.now() < deadline) {
            if (signal.aborted) throw new DOMException("Login cancelled", "AbortError");
            await sleep(intervalMs, signal);

            const res = await fetch(`${CONFIG.relayBaseUrl}/login/oauth/access_token`, {
              method: "POST",
              headers: { "Content-Type": "application/json", Accept: "application/json" },
              body: JSON.stringify({
                client_id: CONFIG.clientId,
                device_code: deviceCode.device_code,
                grant_type: "urn:ietf:params:oauth:grant-type:device_code",
              }),
            });
            if (!res.ok) throw new Error(`relay:Token poll failed (${res.status})`);
            const body = await res.json();

            if (body.access_token) return body.access_token;

            switch (body.error) {
              case "authorization_pending": continue;
              case "slow_down": intervalMs += 5000; continue;
              case "expired_token": throw new Error("expired:Device code expired");
              case "access_denied": throw new Error("denied:Access denied");
              default: throw new Error(`relay:${body.error_description || "Unknown device flow error"}`);
            }
          }
          throw new Error("expired:Device code expired");
        }

        async fetchAuthenticatedUser(accessToken) {
          const res = await fetch("https://api.github.com/user", {
            headers: { Authorization: `Bearer ${accessToken}`, Accept: "application/vnd.github+json" },
          });
          if (!res.ok) throw new Error(`relay:Failed to fetch user profile (${res.status})`);
          const body = await res.json();
          return { login: body.login, name: body.name || null, avatarUrl: body.avatar_url, accessToken };
        }

        async verifyToken(accessToken) {
          const res = await fetch("https://api.github.com/user", { headers: { Authorization: `Bearer ${accessToken}` } });
          return res.ok;
        }

        toAuthError(err) {
          const msg = err instanceof Error ? err.message : String(err);
          if (msg.startsWith("denied:")) return { reason: AuthErrorReason.AccessDenied, message: "Sign-in was cancelled or denied." };
          if (msg.startsWith("expired:")) return { reason: AuthErrorReason.Expired, message: "The login code expired. Please try again." };
          if (msg.startsWith("relay:")) return { reason: AuthErrorReason.RelayUnavailable, message: msg.slice(6) };
          if (err instanceof TypeError) return { reason: AuthErrorReason.NetworkError, message: "Network error contacting GitHub." };
          return { reason: AuthErrorReason.Unknown, message: msg };
        }
      }

      function sleep(ms, signal) {
        return new Promise((resolve, reject) => {
          const t = setTimeout(resolve, ms);
          signal.addEventListener("abort", () => { clearTimeout(t); reject(new DOMException("Login cancelled", "AbortError")); }, { once: true });
        });
      }

      // =====================================================================
      // STORAGE: domain types (documented as shapes, JS has no interfaces)
      // =====================================================================
      const CardStatus = { Backlog: "backlog", InProgress: "in-progress", Blocked: "blocked", Done: "done" };
      const StorageProviderKind = { GitHub: "github", LocalFolder: "local-folder" };

      // ProjectManifest: { id, name, description, jam, theme, createdAt,
      //                     storage: { kind, githubOwner?, githubRepo? } }
      // Card: { id, title, status, description, tags[], assignee, createdAt, updatedAt }
      // Board: { columns: [{ id, status, cardIds[] }] }

      // =====================================================================
      // STORAGE: GitHubStorage — plain fetch against the REST Contents API.
      // Git blob sha doubles as FileHandle.revision for conflict detection
      // (a stale sha on write comes back as 409/422 from GitHub).
      // =====================================================================
      const GAMEJAM_DIR = ".gamejam";

      class StorageConflictError extends Error {
        constructor(path, localRevision, remoteRevision) {
          super(`Conflict writing ${path}: local revision ${localRevision} is stale (remote is ${remoteRevision})`);
          this.name = "StorageConflictError";
          this.path = path;
          this.localRevision = localRevision;
          this.remoteRevision = remoteRevision;
        }
      }

      class GitHubStorage {
        kind = StorageProviderKind.GitHub;
        constructor(accessToken) { this.accessToken = accessToken; }

        authHeaders(extra = {}) {
          return { Authorization: `Bearer ${this.accessToken}`, Accept: "application/vnd.github+json", ...extra };
        }

        async listUserRepos() {
          // GitHub Apps don't have a single "list my repos" call — a user
          // access token only sees repos on installations the user granted.
          // So: list installations first, then repos per installation, and
          // flatten. This replaces the old GET /user/repos approach, which
          // only works for classic OAuth Apps with a "repo" scope, not for
          // GitHub App user tokens.
          const installations = await this.listInstallations();
          const reposByInstallation = await Promise.all(
            installations.map((installation) => this.listInstallationRepos(installation.id)),
          );
          return reposByInstallation.flat();
        }

        async listInstallations() {
          const res = await fetch("https://api.github.com/user/installations?per_page=100", {
            headers: this.authHeaders(),
          });
          if (!res.ok) throw new Error(`Failed to list app installations (${res.status})`);
          const body = await res.json();
          return body.installations || [];
        }

        async listInstallationRepos(installationId) {
          const res = await fetch(
            `https://api.github.com/user/installations/${installationId}/repositories?per_page=100`,
            { headers: this.authHeaders() },
          );
          if (!res.ok) throw new Error(`Failed to list repositories for installation ${installationId} (${res.status})`);
          const body = await res.json();
          return body.repositories || [];
        }

        async detectProject(repo) {
          try {
            await this.getFile(repo, "project.json");
            return true;
          } catch (err) {
            if (err.status === 404) return false;
            throw err;
          }
        }

        async initProject(repo, manifest) {
          const emptyBoard = { columns: [] };
          await this.putFile(repo, "project.json", manifest, null, "Initialize game jam planner");
          await this.putFile(repo, "board.json", emptyBoard, null, "Initialize game jam planner");
          await this.putFile(repo, "milestones.json", [], null, "Initialize game jam planner");
          await this.putFile(repo, "team.json", [], null, "Initialize game jam planner");
          await this.putFile(repo, "assets.json", [], null, "Initialize game jam planner");
        }

        readManifest(repo) { return this.getFile(repo, "project.json"); }
        readBoard(repo) { return this.getFile(repo, "board.json"); }

        async getFile(repo, relativePath) {
          const res = await fetch(
            `https://api.github.com/repos/${repo.owner}/${repo.name}/contents/${GAMEJAM_DIR}/${relativePath}`,
            { headers: this.authHeaders() },
          );
          if (!res.ok) { const err = new Error(`Failed to read ${relativePath} (${res.status})`); err.status = res.status; throw err; }
          const body = await res.json();
          const data = JSON.parse(decodeURIComponent(escape(atob(body.content.replace(/\n/g, "")))));
          return { data, handle: { path: relativePath, revision: body.sha } };
        }

        async putFile(repo, relativePath, data, handle, message) {
          const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
          const res = await fetch(
            `https://api.github.com/repos/${repo.owner}/${repo.name}/contents/${GAMEJAM_DIR}/${relativePath}`,
            {
              method: "PUT",
              headers: this.authHeaders({ "Content-Type": "application/json" }),
              body: JSON.stringify({ message, content, sha: handle ? handle.revision : undefined }),
            },
          );
          if (!res.ok) {
            if ((res.status === 409 || res.status === 422) && handle) {
              const latest = await this.getFile(repo, relativePath).catch(() => null);
              throw new StorageConflictError(relativePath, handle.revision, latest ? latest.handle.revision : "unknown");
            }
            throw new Error(`Failed to write ${relativePath} (${res.status})`);
          }
          const body = await res.json();
          return { path: relativePath, revision: body.content.sha };
        }
      }

      // =====================================================================
      // UI
      // =====================================================================
      const { useState, useEffect, useRef, useCallback } = React;

      function Spinner() { return <span className="spinner" />; }

      function LoginScreen({ auth, onSignedIn }) {
        const [state, setState] = useState(auth.state);

        useEffect(() => auth.onStateChange(setState), [auth]);

        useEffect(() => {
          if (state.status === AuthStatus.SignedIn) onSignedIn(state.user);
        }, [state]);

        const handleLogin = () => { auth.login().catch(() => {}); };

        return (
          <div className="card">
            <p className="title">Game Jam Planner</p>
            <p className="subtitle">Local-first planning, backed by your GitHub repo.</p>

            {state.status === AuthStatus.Error && (
              <div className="error-box">{state.error.message}</div>
            )}

            {(state.status === AuthStatus.SignedOut || state.status === AuthStatus.Error) && (
              <button className="btn-primary" onClick={handleLogin}>Login with GitHub</button>
            )}

            {state.status === AuthStatus.AwaitingDeviceCode && (
              <div className="status-line"><Spinner /> Requesting a login code…</div>
            )}

            {state.status === AuthStatus.AwaitingUserVerification && (
              <div>
                <div className="device-code">{state.userCode}</div>
                <p style={{ textAlign: "center", fontSize: 14, color: "var(--text-dim)" }}>
                  Go to{" "}
                  <a className="verify-link" href={state.verificationUriComplete} target="_blank" rel="noreferrer">
                    {state.verificationUri}
                  </a>{" "}
                  and enter this code.
                </p>
                <div className="status-line"><Spinner /> Waiting for you to approve access…</div>
              </div>
            )}

            {state.status === AuthStatus.Polling && (
              <div className="status-line"><Spinner /> Signing you in…</div>
            )}
          </div>
        );
      }

      function RepoList({ user, storage, onSelectRepo, onLogout }) {
        const [repos, setRepos] = useState(null);
        const [error, setError] = useState(null);

        useEffect(() => {
          storage.listUserRepos()
            .then((data) => setRepos(data))
            .catch((err) => setError(err.message));
        }, [storage]);

        return (
          <div className="card">
            <div className="user-row">
              <img src={user.avatarUrl} alt="" />
              <div>
                <div className="name">{user.name || user.login}</div>
                <div className="login">@{user.login}</div>
              </div>
              <button className="link-btn" onClick={onLogout}>Sign out</button>
            </div>

            <p className="title" style={{ fontSize: 16 }}>Choose a repository</p>
            <p className="subtitle">Pick where your game jam project lives.</p>

            {error && <div className="error-box">{error}</div>}

            {!repos && !error && <div className="status-line"><Spinner /> Loading repositories…</div>}

            {repos && repos.length === 0 && (
              <div className="empty-state">
                <p>No repositories yet — this app can only see repos it's been installed on.</p>
                <a
                  className="verify-link"
                  href={`https://github.com/apps/${CONFIG.appSlug}/installations/new`}
                  target="_blank"
                  rel="noreferrer"
                >
                  Install the app on a repository
                </a>
              </div>
            )}

            {repos && repos.length > 0 && (
              <>
                <ul className="repo-list">
                  {repos.map((repo) => (
                    <li key={repo.id} className="repo-item" onClick={() => onSelectRepo(repo)}>
                      <div>
                        <div className="repo-name">{repo.full_name}</div>
                        <div className="repo-meta">{repo.private ? "Private" : "Public"} · updated {new Date(repo.updated_at).toLocaleDateString()}</div>
                      </div>
                      <span className="badge">{repo.permissions && repo.permissions.admin ? "admin" : repo.permissions && repo.permissions.push ? "write" : "read"}</span>
                    </li>
                  ))}
                </ul>
                <p style={{ textAlign: "center", marginTop: 12 }}>
                  <a
                    className="verify-link"
                    style={{ fontSize: 12 }}
                    href={`https://github.com/apps/${CONFIG.appSlug}/installations/new`}
                    target="_blank"
                    rel="noreferrer"
                  >
                    Don't see a repo? Manage app installations
                  </a>
                </p>
              </>
            )}
          </div>
        );
      }

      function App() {
        const authRef = useRef(null);
        if (!authRef.current) authRef.current = new GitHubDeviceFlowAuth();
        const auth = authRef.current;

        const [user, setUser] = useState(null);
        const [restoring, setRestoring] = useState(true);
        const [selectedRepo, setSelectedRepo] = useState(null);

        useEffect(() => {
          auth.restoreSession().then((u) => { setUser(u); setRestoring(false); });
        }, []);

        const handleLogout = useCallback(() => { auth.logout(); setUser(null); setSelectedRepo(null); }, [auth]);

        if (restoring) {
          return <div className="card"><div className="status-line"><Spinner /> Checking for an existing session…</div></div>;
        }

        if (!user) {
          return <LoginScreen auth={auth} onSignedIn={setUser} />;
        }

        const storage = new GitHubStorage(user.accessToken);

        if (!selectedRepo) {
          return (
            <RepoList
              user={user}
              storage={storage}
              onLogout={handleLogout}
              onSelectRepo={(repo) => setSelectedRepo(repo)}
            />
          );
        }

        // Next step: detectProject() -> either open the existing .gamejam/
        // workspace or offer to initialize one, per planning.md's
        // "GitHub Flow" section. Wiring that up is the next piece of work.
        return (
          <div className="card">
            <p className="title" style={{ fontSize: 16 }}>{selectedRepo.full_name}</p>
            <p className="subtitle">Repository selected. Workspace init/open comes next.</p>
            <button onClick={() => setSelectedRepo(null)}>Back to repositories</button>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>

    <script>
      // Babel's automatic script-tag scanner defaults to the "automatic" JSX
      // runtime, which emits `import { jsx } from "react/jsx-runtime"` even
      // without data-type="module" — that import statement is what breaks on
      // file://. Transforming manually lets us force the classic runtime
      // (React.createElement calls, no imports) so this stays a plain script.
      const source = document.getElementById("app-source").textContent;
      const { code } = Babel.transform(source, {
        presets: [["react", { runtime: "classic" }]],
      });
      const script = document.createElement("script");
      script.textContent = code;
      document.body.appendChild(script);
    </script>
  </body>
</html>
