<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Jam Planner</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --panel-border: #262b36;
        --text: #e7e9ee;
        --text-dim: #9aa2b1;
        --accent: #6ee7b7;
        --accent-dim: #2e5a4a;
        --danger: #f87171;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      #root {
        width: 100%;
        max-width: 560px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 32px;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 4px;
      }
      .subtitle {
        color: var(--text-dim);
        font-size: 14px;
        margin: 0 0 24px;
      }
      button {
        font: inherit;
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid var(--panel-border);
        background: #1f232c;
        color: var(--text);
        padding: 10px 16px;
        transition: border-color 0.15s;
      }
      button:hover {
        border-color: var(--accent);
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .btn-primary {
        background: var(--accent);
        color: #0f1115;
        border-color: var(--accent);
        font-weight: 600;
        width: 100%;
        padding: 12px 16px;
      }
      .btn-primary:hover {
        filter: brightness(1.05);
      }
      .device-code {
        font-size: 32px;
        letter-spacing: 4px;
        font-weight: 700;
        text-align: center;
        background: #0f1115;
        border: 1px dashed var(--panel-border);
        border-radius: 8px;
        padding: 16px;
        margin: 20px 0;
        color: var(--accent);
      }
      .status-line {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 16px;
      }
      .spinner {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid var(--panel-border);
        border-top-color: var(--accent);
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .error-box {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid var(--danger);
        color: var(--danger);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 13px;
        margin-bottom: 16px;
      }
      .repo-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .repo-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        margin-bottom: 8px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .repo-item:hover {
        border-color: var(--accent);
        background: #1b1f27;
      }
      .repo-name {
        font-weight: 500;
      }
      .repo-meta {
        color: var(--text-dim);
        font-size: 12px;
        margin-top: 2px;
      }
      .badge {
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 999px;
        background: var(--accent-dim);
        color: var(--accent);
        white-space: nowrap;
      }
      .user-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
      }
      .user-row img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }
      .user-row .name {
        font-weight: 600;
        font-size: 14px;
      }
      .user-row .login {
        color: var(--text-dim);
        font-size: 12px;
      }
      .link-btn {
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 12px;
        padding: 4px;
        margin-left: auto;
      }
      .link-btn:hover {
        color: var(--text);
        border-color: transparent;
      }
      a.verify-link {
        color: var(--accent);
      }
      .empty-state {
        color: var(--text-dim);
        font-size: 13px;
        text-align: center;
        padding: 24px 0;
      }
      .field {
        margin-bottom: 16px;
      }
      .field label {
        display: block;
        font-size: 13px;
        color: var(--text-dim);
        margin-bottom: 6px;
      }
      .field input,
      .field textarea {
        width: 100%;
        font: inherit;
        background: #0f1115;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        color: var(--text);
        padding: 10px 12px;
      }
      .field input:focus,
      .field textarea:focus {
        outline: none;
        border-color: var(--accent);
      }
      .field textarea {
        resize: vertical;
        min-height: 64px;
      }
      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-dim);
        font-size: 13px;
        margin-bottom: 16px;
      }
      .breadcrumb button {
        padding: 4px 8px;
        font-size: 12px;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin: 20px 0;
      }
      .stat-box {
        background: #0f1115;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 14px;
        text-align: center;
      }
      .stat-box .stat-value {
        font-size: 22px;
        font-weight: 700;
        color: var(--accent);
      }
      .stat-box .stat-label {
        font-size: 12px;
        color: var(--text-dim);
        margin-top: 2px;
      }

      .board-topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .board-topbar-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .board-topbar-actions button.btn-primary {
        width: auto;
        padding: 8px 20px;
      }
      .board-columns {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        padding-bottom: 8px;
      }
      .board-column {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 14px;
        width: 260px;
        flex: 0 0 260px;
        display: flex;
        flex-direction: column;
        max-height: max(320px, calc(100vh - 220px));
      }
      .board-column-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-weight: 600;
        font-size: 13px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 10px;
      }
      .board-column-count {
        background: #0f1115;
        border-radius: 999px;
        padding: 1px 8px;
        font-size: 11px;
      }
      .board-column-cards {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-height: 24px;
        margin-bottom: 10px;
        flex: 1;
        overflow-y: auto;
        padding-right: 4px;
      }
      .board-column-cards::-webkit-scrollbar {
        width: 6px;
      }
      .board-column-cards::-webkit-scrollbar-track {
        background: transparent;
      }
      .board-column-cards::-webkit-scrollbar-thumb {
        background: var(--panel-border);
        border-radius: 999px;
      }
      .board-column-cards::-webkit-scrollbar-thumb:hover {
        background: var(--accent-dim);
      }
      .board-card {
        background: #0f1115;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 10px 12px;
      }
      .board-card-title {
        font-size: 13px;
        margin-bottom: 8px;
        overflow-wrap: anywhere;
      }
      .board-card-actions {
        display: flex;
        gap: 6px;
      }
      .board-card-actions button {
        padding: 3px 8px;
        font-size: 11px;
        border-radius: 6px;
      }
      .board-card-delete {
        margin-left: auto;
        color: var(--danger);
      }
      .add-card-row {
        display: flex;
        gap: 6px;
      }
      .add-card-row input {
        flex: 1;
        font-size: 13px;
        padding: 7px 10px;
        background: #0f1115;
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        color: var(--text);
      }
      .add-card-row button {
        padding: 7px 12px;
      }

      .board-column.drag-over {
        border-color: var(--accent);
        background: #1b1f27;
      }
      .board-card {
        cursor: pointer;
        border-left: 3px solid var(--panel-border);
        transition:
          opacity 0.15s,
          border-color 0.15s,
          transform 0.1s;
      }
      .board-card:hover {
        border-color: var(--accent);
      }
      .board-card.dragging {
        opacity: 0.4;
      }
      .board-card--backlog {
        border-left-color: #6b7280;
      }
      .board-card--in-progress {
        border-left-color: #60a5fa;
      }
      .board-card--blocked {
        border-left-color: var(--danger);
      }
      .board-card--done {
        border-left-color: var(--accent);
      }

      .card-meta-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }
      .tag-pill {
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 999px;
        background: #1f232c;
        color: var(--text-dim);
        border: 1px solid var(--panel-border);
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .avatar-badge {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--accent-dim);
        color: var(--accent);
        font-size: 10px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-left: auto;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        z-index: 50;
      }
      .modal-panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 28px;
        width: 100%;
        max-width: 480px;
        max-height: 85vh;
        overflow-y: auto;
      }
      .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
      }
      .modal-close {
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 18px;
        line-height: 1;
        padding: 4px;
      }
      .modal-close:hover {
        color: var(--text);
        border-color: transparent;
      }
      .modal-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 20px;
        gap: 12px;
      }
      .modal-footer .btn-primary {
        width: auto;
        padding: 10px 24px;
      }
      .btn-danger-text {
        background: none;
        border: none;
        color: var(--danger);
        padding: 8px 4px;
      }
      .btn-danger-text:hover {
        border-color: transparent;
        text-decoration: underline;
      }
      .status-select {
        width: 100%;
        font: inherit;
        background: #0f1115;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        color: var(--text);
        padding: 10px 12px;
      }

      .field-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }
      .field-header label {
        margin-bottom: 0;
      }
      .mic-button {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        flex-shrink: 0;
      }
      .mic-button.listening {
        border-color: var(--danger);
        color: var(--danger);
        animation: mic-pulse 1.2s infinite;
      }
      .mic-button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      @keyframes mic-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.4);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(248, 113, 113, 0);
        }
      }
      .interim-text {
        font-size: 12px;
        color: var(--text-dim);
        font-style: italic;
        margin-top: 6px;
      }
      .speech-error {
        font-size: 12px;
        color: var(--danger);
        margin-top: 6px;
      }

      .view-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 20px;
        border-bottom: 1px solid var(--panel-border);
      }
      .view-tabs button {
        background: none;
        border: none;
        border-radius: 0;
        border-bottom: 2px solid transparent;
        padding: 10px 4px;
        margin-right: 20px;
        color: var(--text-dim);
        font-size: 14px;
      }
      .view-tabs button:hover {
        border-color: var(--panel-border);
        color: var(--text);
      }
      .view-tabs button.active {
        color: var(--accent);
        border-color: var(--accent);
        font-weight: 600;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
        margin-bottom: 24px;
      }
      .dashboard-stat {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 18px;
        text-align: center;
      }
      .dashboard-stat .stat-value {
        font-size: 26px;
        font-weight: 700;
        color: var(--accent);
      }
      .dashboard-stat .stat-label {
        font-size: 12px;
        color: var(--text-dim);
        margin-top: 4px;
      }

      .dashboard-columns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      @media (max-width: 720px) {
        .dashboard-columns {
          grid-template-columns: 1fr;
        }
      }
      .dashboard-panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 20px;
      }
      .dashboard-panel h3 {
        font-size: 14px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin: 0 0 14px;
      }

      .activity-item {
        display: flex;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--panel-border);
      }
      .activity-item:last-child {
        border-bottom: none;
      }
      .activity-item img {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .activity-item .activity-message {
        font-size: 13px;
      }
      .activity-item .activity-meta {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 2px;
      }

      .team-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--panel-border);
      }
      .team-row:last-child {
        border-bottom: none;
      }
      .team-row img {
        width: 28px;
        height: 28px;
        border-radius: 50%;
      }
      .team-row .team-login {
        font-size: 13px;
        font-weight: 500;
      }
      .team-row .badge {
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React 18 (UMD) + Babel standalone for in-browser JSX/TS. No build step. -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/plain" id="app-source">

      // =====================================================================
      // CONFIG
      // =====================================================================
      // Fill these in once you've registered a classic GitHub OAuth App with
      // Device Flow enabled (Settings > Developer settings > OAuth Apps >
      // your app > Enable Device Flow). CLIENT_ID is public and safe to ship
      // in this file.
      //
      // RELAY_BASE_URL points at a tiny stateless CORS relay, because GitHub's
      // /login/device/code and /login/oauth/access_token endpoints don't send
      // CORS headers, so a browser can't call them directly. The relay just
      // forwards the POST and adds `Access-Control-Allow-Origin: *` — it never
      // sees a client secret, since Device Flow doesn't use one.
      //
      // scopes: OAuth Apps (unlike GitHub Apps) DO use scopes, requested here
      // at login time. "repo" grants read/write on private + public repos,
      // which is what the Contents API calls need for .gamejam/*.json.
      const CONFIG = {
        clientId: "Ov23liy7kjuppgIY5yU1",
        relayBaseUrl: "https://little-grass-e4c2gamejam-planner.justin-dean-young.workers.dev",
        scopes: ["repo"],
      };

      // =====================================================================
      // AUTH: types
      // =====================================================================
      const AuthStatus = {
        SignedOut: "signed-out",
        AwaitingDeviceCode: "awaiting-device-code",
        AwaitingUserVerification: "awaiting-user-verification",
        Polling: "polling",
        SignedIn: "signed-in",
        Error: "error",
      };

      const AuthErrorReason = {
        AccessDenied: "access-denied",
        Expired: "expired",
        NetworkError: "network-error",
        RelayUnavailable: "relay-unavailable",
        Unknown: "unknown",
      };

      // AuthenticatedUser shape: { login, name, avatarUrl, accessToken }

      // =====================================================================
      // AUTH: GitHub Device Flow, via plain fetch through the CORS relay
      // =====================================================================
      const SESSION_KEY = "gamejam-planner:github-session";

      class GitHubDeviceFlowAuth {
        state = { status: AuthStatus.SignedOut };
        listeners = new Set();
        pollAbort = null;

        onStateChange(listener) {
          this.listeners.add(listener);
          return () => this.listeners.delete(listener);
        }

        setState(next) {
          this.state = next;
          this.listeners.forEach((l) => l(next));
        }

        async restoreSession() {
          const raw = sessionStorage.getItem(SESSION_KEY);
          if (!raw) return null;
          try {
            const user = JSON.parse(raw);
            const ok = await this.verifyToken(user.accessToken);
            if (!ok) { sessionStorage.removeItem(SESSION_KEY); return null; }
            this.setState({ status: AuthStatus.SignedIn, user });
            return user;
          } catch {
            sessionStorage.removeItem(SESSION_KEY);
            return null;
          }
        }

        async login() {
          this.pollAbort?.abort();
          this.pollAbort = new AbortController();
          try {
            this.setState({ status: AuthStatus.AwaitingDeviceCode });
            const deviceCode = await this.requestDeviceCode();

            this.setState({
              status: AuthStatus.AwaitingUserVerification,
              userCode: deviceCode.user_code,
              verificationUri: deviceCode.verification_uri,
              verificationUriComplete: deviceCode.verification_uri_complete || deviceCode.verification_uri,
              expiresInSeconds: deviceCode.expires_in,
            });

            const accessToken = await this.pollForToken(deviceCode, this.pollAbort.signal);
            this.setState({ status: AuthStatus.Polling });

            const user = await this.fetchAuthenticatedUser(accessToken);
            sessionStorage.setItem(SESSION_KEY, JSON.stringify(user));
            this.setState({ status: AuthStatus.SignedIn, user });
            return user;
          } catch (err) {
            this.setState({ status: AuthStatus.Error, error: this.toAuthError(err) });
            throw err;
          }
        }

        logout() {
          this.pollAbort?.abort();
          sessionStorage.removeItem(SESSION_KEY);
          this.setState({ status: AuthStatus.SignedOut });
        }

        async requestDeviceCode() {
          const res = await fetch(`${CONFIG.relayBaseUrl}/login/device/code`, {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify({ client_id: CONFIG.clientId, scope: CONFIG.scopes.join(" ") }),
          });
          if (!res.ok) throw new Error(`relay:Device code request failed (${res.status})`);
          return res.json();
        }

        async pollForToken(deviceCode, signal) {
          let intervalMs = Math.max(deviceCode.interval * 1000, 5000);
          const deadline = Date.now() + deviceCode.expires_in * 1000;

          while (Date.now() < deadline) {
            if (signal.aborted) throw new DOMException("Login cancelled", "AbortError");
            await sleep(intervalMs, signal);

            const res = await fetch(`${CONFIG.relayBaseUrl}/login/oauth/access_token`, {
              method: "POST",
              headers: { "Content-Type": "application/json", Accept: "application/json" },
              body: JSON.stringify({
                client_id: CONFIG.clientId,
                device_code: deviceCode.device_code,
                grant_type: "urn:ietf:params:oauth:grant-type:device_code",
              }),
            });
            if (!res.ok) throw new Error(`relay:Token poll failed (${res.status})`);
            const body = await res.json();

            if (body.access_token) return body.access_token;

            switch (body.error) {
              case "authorization_pending": continue;
              case "slow_down": intervalMs += 5000; continue;
              case "expired_token": throw new Error("expired:Device code expired");
              case "access_denied": throw new Error("denied:Access denied");
              default: throw new Error(`relay:${body.error_description || "Unknown device flow error"}`);
            }
          }
          throw new Error("expired:Device code expired");
        }

        async fetchAuthenticatedUser(accessToken) {
          const res = await fetch("https://api.github.com/user", {
            headers: { Authorization: `Bearer ${accessToken}`, Accept: "application/vnd.github+json" },
          });
          if (!res.ok) throw new Error(`relay:Failed to fetch user profile (${res.status})`);
          const body = await res.json();
          return { login: body.login, name: body.name || null, avatarUrl: body.avatar_url, accessToken };
        }

        async verifyToken(accessToken) {
          const res = await fetch("https://api.github.com/user", { headers: { Authorization: `Bearer ${accessToken}` } });
          return res.ok;
        }

        toAuthError(err) {
          const msg = err instanceof Error ? err.message : String(err);
          if (msg.startsWith("denied:")) return { reason: AuthErrorReason.AccessDenied, message: "Sign-in was cancelled or denied." };
          if (msg.startsWith("expired:")) return { reason: AuthErrorReason.Expired, message: "The login code expired. Please try again." };
          if (msg.startsWith("relay:")) return { reason: AuthErrorReason.RelayUnavailable, message: msg.slice(6) };
          if (err instanceof TypeError) return { reason: AuthErrorReason.NetworkError, message: "Network error contacting GitHub." };
          return { reason: AuthErrorReason.Unknown, message: msg };
        }
      }

      function sleep(ms, signal) {
        return new Promise((resolve, reject) => {
          const t = setTimeout(resolve, ms);
          signal.addEventListener("abort", () => { clearTimeout(t); reject(new DOMException("Login cancelled", "AbortError")); }, { once: true });
        });
      }

      // =====================================================================
      // STORAGE: domain types (documented as shapes, JS has no interfaces)
      // =====================================================================
      const CardStatus = { Backlog: "backlog", InProgress: "in-progress", Blocked: "blocked", Done: "done" };
      const StorageProviderKind = { GitHub: "github", LocalFolder: "local-folder" };

      // ProjectManifest: { id, name, description, jam, theme, createdAt,
      //                     storage: { kind, githubOwner?, githubRepo? } }
      // Card: { id, title, status, description, tags[], assignee, createdAt, updatedAt }
      // Board: { columns: [{ id, status, cardIds[] }] }

      // =====================================================================
      // STORAGE: GitHubStorage — plain fetch against the REST Contents API.
      // Git blob sha doubles as FileHandle.revision for conflict detection
      // (a stale sha on write comes back as 409/422 from GitHub).
      // =====================================================================
      const GAMEJAM_DIR = ".gamejam";

      class StorageConflictError extends Error {
        constructor(path, localRevision, remoteRevision) {
          super(`Conflict writing ${path}: local revision ${localRevision} is stale (remote is ${remoteRevision})`);
          this.name = "StorageConflictError";
          this.path = path;
          this.localRevision = localRevision;
          this.remoteRevision = remoteRevision;
        }
      }

      class GitHubStorage {
        kind = StorageProviderKind.GitHub;
        constructor(accessToken) { this.accessToken = accessToken; }

        authHeaders(extra = {}) {
          return { Authorization: `Bearer ${this.accessToken}`, Accept: "application/vnd.github+json", ...extra };
        }

        async listUserRepos() {
          // Classic OAuth App with "repo" scope: this single call returns
          // every repo the user can access (owned + collaborator), no
          // separate install step needed.
          const res = await fetch(
            "https://api.github.com/user/repos?per_page=100&sort=updated&affiliation=owner,collaborator",
            { headers: this.authHeaders() },
          );
          if (!res.ok) throw new Error(`Failed to list repositories (${res.status})`);
          return res.json();
        }

        async listCollaborators(repo) {
          // Repo access list (admin/write/read), not commit-history
          // "contributors" — this matches who's actually on the jam team per
          // planning.md's Authorization section, including people who haven't
          // committed yet. Requires push access to the repo to call.
          const res = await fetch(
            `https://api.github.com/repos/${repo.owner}/${repo.name}/collaborators?per_page=100`,
            { headers: this.authHeaders() },
          );
          if (!res.ok) throw new Error(`Failed to list collaborators (${res.status})`);
          const body = await res.json();
          return body.map((c) => c.login);
        }

        async listCollaboratorsWithPermissions(repo) {
          // Same endpoint as listCollaborators, but keeps the permission level
          // and avatar for the Team page instead of flattening to just logins.
          const res = await fetch(
            `https://api.github.com/repos/${repo.owner}/${repo.name}/collaborators?per_page=100`,
            { headers: this.authHeaders() },
          );
          if (!res.ok) throw new Error(`Failed to list collaborators (${res.status})`);
          const body = await res.json();
          return body.map((c) => ({
            login: c.login,
            avatarUrl: c.avatar_url,
            permission: c.permissions && c.permissions.admin ? "admin" : c.permissions && c.permissions.push ? "write" : "read",
          }));
        }

        readTeam(repo) { return this.getFile(repo, "team.json"); }
        writeTeam(repo, data, handle) { return this.putFile(repo, "team.json", data, handle, "Sync team roster"); }

        async listRecentActivity(repo, limit = 8) {
          // Git history as the activity log, per planning.md's Collaboration
          // section — scoped to .gamejam/ so this doesn't pick up unrelated
          // commits to game source code sitting in the same repo.
          const res = await fetch(
            `https://api.github.com/repos/${repo.owner}/${repo.name}/commits?path=${GAMEJAM_DIR}&per_page=${limit}`,
            { headers: this.authHeaders() },
          );
          if (!res.ok) throw new Error(`Failed to load activity (${res.status})`);
          const body = await res.json();
          return body.map((c) => ({
            sha: c.sha,
            message: c.commit.message.split("\n")[0],
            authorLogin: c.author ? c.author.login : (c.commit.author ? c.commit.author.name : "unknown"),
            authorAvatarUrl: c.author ? c.author.avatar_url : null,
            date: c.commit.author ? c.commit.author.date : null,
          }));
        }

        async detectProject(repo) {
          try {
            await this.getFile(repo, "project.json");
            return true;
          } catch (err) {
            if (err.status === 404) return false;
            throw err;
          }
        }

        async initProject(repo, manifest) {
          const emptyBoard = { columns: [] };
          await this.putFile(repo, "project.json", manifest, null, "Initialize game jam planner");
          await this.putFile(repo, "board.json", emptyBoard, null, "Initialize game jam planner");
          await this.putFile(repo, "milestones.json", [], null, "Initialize game jam planner");
          await this.putFile(repo, "team.json", [], null, "Initialize game jam planner");
          await this.putFile(repo, "assets.json", [], null, "Initialize game jam planner");
        }

        readManifest(repo) { return this.getFile(repo, "project.json"); }
        readBoard(repo) { return this.getFile(repo, "board.json"); }

        async listCardIds(repo) {
          const res = await fetch(
            `https://api.github.com/repos/${repo.owner}/${repo.name}/contents/${GAMEJAM_DIR}/cards`,
            { headers: this.authHeaders() },
          );
          if (res.status === 404) return []; // cards/ doesn't exist yet — no cards written
          if (!res.ok) throw new Error(`Failed to list cards (${res.status})`);
          const entries = await res.json();
          return (Array.isArray(entries) ? entries : [])
            .filter((e) => e.type === "file" && e.name.endsWith(".json"))
            .map((e) => e.name.replace(/\.json$/, ""));
        }

        readCard(repo, cardId) {
          return this.getFile(repo, `cards/${cardId}.json`);
        }

        writeCard(repo, cardId, data, handle) {
          return this.putFile(repo, `cards/${cardId}.json`, data, handle, `Update card: ${data.title}`);
        }

        async deleteCard(repo, cardId, handle) {
          const res = await fetch(
            `https://api.github.com/repos/${repo.owner}/${repo.name}/contents/${GAMEJAM_DIR}/cards/${cardId}.json`,
            {
              method: "DELETE",
              headers: this.authHeaders({ "Content-Type": "application/json" }),
              body: JSON.stringify({ message: `Remove card: ${cardId}`, sha: handle.revision }),
            },
          );
          if (!res.ok) throw new Error(`Failed to delete card ${cardId} (${res.status})`);
        }

        /**
         * Writes each dirty file independently rather than as a single atomic
         * git tree/commit. Matches "one file per card, few conflicts" from
         * planning.md — a true atomic multi-file commit (git trees API) is a
         * reasonable upgrade later if autosave batches get large.
         */
        async commitBatch(repo, message, writes) {
          const succeeded = [];
          const conflicts = [];

          for (const write of writes) {
            try {
              let handle;
              if (write.file === "board") {
                handle = await this.putFile(repo, "board.json", write.data, write.handle, message);
              } else if (write.file === "card") {
                handle = await this.writeCard(repo, write.cardId, write.data, write.handle);
              } else {
                continue;
              }
              succeeded.push(handle);
            } catch (err) {
              if (err instanceof StorageConflictError) {
                conflicts.push(err);
              } else {
                throw err;
              }
            }
          }

          return { succeeded, conflicts };
        }

        async getFile(repo, relativePath) {
          const res = await fetch(
            `https://api.github.com/repos/${repo.owner}/${repo.name}/contents/${GAMEJAM_DIR}/${relativePath}`,
            { headers: this.authHeaders() },
          );
          if (!res.ok) { const err = new Error(`Failed to read ${relativePath} (${res.status})`); err.status = res.status; throw err; }
          const body = await res.json();
          const data = JSON.parse(decodeURIComponent(escape(atob(body.content.replace(/\n/g, "")))));
          return { data, handle: { path: relativePath, revision: body.sha } };
        }

        async putFile(repo, relativePath, data, handle, message) {
          const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
          const res = await fetch(
            `https://api.github.com/repos/${repo.owner}/${repo.name}/contents/${GAMEJAM_DIR}/${relativePath}`,
            {
              method: "PUT",
              headers: this.authHeaders({ "Content-Type": "application/json" }),
              body: JSON.stringify({ message, content, sha: handle ? handle.revision : undefined }),
            },
          );
          if (!res.ok) {
            if ((res.status === 409 || res.status === 422) && handle) {
              const latest = await this.getFile(repo, relativePath).catch(() => null);
              throw new StorageConflictError(relativePath, handle.revision, latest ? latest.handle.revision : "unknown");
            }
            throw new Error(`Failed to write ${relativePath} (${res.status})`);
          }
          const body = await res.json();
          return { path: relativePath, revision: body.content.sha };
        }
      }

      // =====================================================================
      // WORKSPACE — dirty-state tracking, batched save, autosave.
      // Per planning.md's "Saving Strategy": don't commit every interaction,
      // batch changes, autosave every few minutes, meaningful commit messages.
      // This is the plain-JS port of the Workspace design from earlier in the
      // project (originally sketched as TS modules before the pivot to a
      // single file) — same ideas, rewritten to live in #app-source.
      // =====================================================================
      class Workspace {
        constructor(storage, repo, autosaveIntervalMs = 3 * 60 * 1000) {
          this.storage = storage;
          this.repo = repo;
          this.autosaveIntervalMs = autosaveIntervalMs;
          this.listeners = new Set();

          this.manifest = null; // { data, handle }
          this.board = null;    // { data, handle, dirty }
          this.cards = new Map(); // id -> { data, handle, dirty, deleted }

          this.saving = false;
          this.conflicts = [];
          this.autosaveTimer = null;
        }

        onChange(listener) {
          this.listeners.add(listener);
          return () => this.listeners.delete(listener);
        }

        emit() {
          this.listeners.forEach((listener) => listener());
        }

        async load() {
          const [manifestResult, boardResult, cardIds] = await Promise.all([
            this.storage.readManifest(this.repo),
            this.storage.readBoard(this.repo),
            this.storage.listCardIds(this.repo),
          ]);

          this.manifest = { data: manifestResult.data, handle: manifestResult.handle };
          this.board = { data: boardResult.data, handle: boardResult.handle, dirty: false };

          const loadedCards = await Promise.all(cardIds.map((id) => this.storage.readCard(this.repo, id)));
          this.cards = new Map(
            loadedCards.map((result) => [result.data.id, { data: result.data, handle: result.handle, dirty: false, deleted: false }]),
          );

          // Seed default columns on a freshly initialized, empty board so the
          // Kanban UI has somewhere to put cards. Persisted on next save.
          if (this.board.data.columns.length === 0) {
            this.board.data = {
              columns: Object.values(CardStatus).map((status) => ({ id: status, status, cardIds: [] })),
            };
            this.board.dirty = true;
          }

          this.emit();
        }

        get project() {
          const cards = {};
          for (const [id, tracked] of this.cards) if (!tracked.deleted) cards[id] = tracked.data;
          return { manifest: this.manifest.data, board: this.board.data, cards };
        }

        dirtyPaths() {
          const paths = [];
          if (this.board.dirty) paths.push("board.json");
          for (const [id, tracked] of this.cards) if (tracked.dirty || tracked.deleted) paths.push(`cards/${id}.json`);
          return paths;
        }

        updateBoard(updater) {
          this.board.data = updater(this.board.data);
          this.board.dirty = true;
          this.emit();
        }

        upsertCard(card) {
          const existing = this.cards.get(card.id);
          this.cards.set(card.id, { data: card, handle: existing ? existing.handle : null, dirty: true, deleted: false });
          this.emit();
        }

        addCard({ title, status }) {
          const id = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
          const now = new Date().toISOString();
          const card = { id, title, status, description: "", tags: [], assignee: null, createdAt: now, updatedAt: now };
          this.upsertCard(card);
          this.updateBoard((board) => ({
            columns: board.columns.map((col) => (col.status === status ? { ...col, cardIds: [...col.cardIds, id] } : col)),
          }));
          return card;
        }

        moveCard(cardId, toStatus) {
          const tracked = this.cards.get(cardId);
          if (!tracked || tracked.data.status === toStatus) return;
          const fromStatus = tracked.data.status;
          this.upsertCard({ ...tracked.data, status: toStatus, updatedAt: new Date().toISOString() });
          this.updateBoard((board) => ({
            columns: board.columns.map((col) => {
              if (col.status === fromStatus) return { ...col, cardIds: col.cardIds.filter((id) => id !== cardId) };
              if (col.status === toStatus) return { ...col, cardIds: [...col.cardIds, cardId] };
              return col;
            }),
          }));
        }

        deleteCard(cardId) {
          const tracked = this.cards.get(cardId);
          if (!tracked) return;
          tracked.deleted = true;
          this.updateBoard((board) => ({
            columns: board.columns.map((col) => ({ ...col, cardIds: col.cardIds.filter((id) => id !== cardId) })),
          }));
        }

        /** Manual save, per planning.md: "Save manually or autosave every few minutes." */
        async save(message = "Planning updates") {
          if (this.saving) return;
          this.saving = true;
          this.emit();

          try {
            // Deletions go out first, one at a time (the Contents API delete
            // endpoint isn't part of the batch write shape).
            for (const [id, tracked] of this.cards) {
              if (tracked.deleted) {
                if (tracked.handle) {
                  await this.storage.deleteCard(this.repo, id, tracked.handle);
                }
                this.cards.delete(id);
              }
            }

            const writes = [];
            if (this.board.dirty) writes.push({ file: "board", data: this.board.data, handle: this.board.handle });
            for (const [id, tracked] of this.cards) {
              if (tracked.dirty) writes.push({ file: "card", cardId: id, data: tracked.data, handle: tracked.handle });
            }

            if (writes.length > 0) {
              const result = await this.storage.commitBatch(this.repo, message, writes);
              for (const handle of result.succeeded) {
                if (handle.path === "board.json") {
                  this.board.handle = handle;
                  this.board.dirty = false;
                } else if (handle.path.startsWith("cards/")) {
                  const id = handle.path.slice("cards/".length, -".json".length);
                  const tracked = this.cards.get(id);
                  if (tracked) { tracked.handle = handle; tracked.dirty = false; }
                }
              }
              this.conflicts = result.conflicts;
            } else {
              this.conflicts = [];
            }
          } finally {
            this.saving = false;
            this.emit();
          }
        }

        /**
         * Minimal conflict recovery: reload everything from GitHub, discarding
         * local unsaved changes to the conflicting files. A real field-level
         * merge (per planning.md's Sync section) is future work — this is the
         * "prompt the user" half without the "auto-merge different fields" half.
         */
        async reloadDiscardingLocalChanges() {
          await this.load();
          this.conflicts = [];
          this.emit();
        }

        startAutosave() {
          this.stopAutosave();
          this.autosaveTimer = setInterval(() => {
            if (this.dirtyPaths().length > 0) this.save("Autosave").catch(() => {});
          }, this.autosaveIntervalMs);
        }

        stopAutosave() {
          if (this.autosaveTimer) clearInterval(this.autosaveTimer);
          this.autosaveTimer = null;
        }
      }

      function useWorkspace(storage, repo) {
        const workspaceRef = useRef(null);
        if (!workspaceRef.current) workspaceRef.current = new Workspace(storage, repo);
        const workspace = workspaceRef.current;

        const [, forceRender] = useState(0);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);

        useEffect(() => {
          const unsubscribe = workspace.onChange(() => forceRender((n) => n + 1));
          workspace.load()
            .then(() => { setLoading(false); workspace.startAutosave(); })
            .catch((err) => { setError(err.message); setLoading(false); });
          return () => { unsubscribe(); workspace.stopAutosave(); };
        }, [workspace]);

        return {
          loading,
          error,
          workspace,
          project: (loading || error) ? null : workspace.project,
          dirty: !loading && !error && workspace.dirtyPaths().length > 0,
          saving: workspace.saving,
          conflicts: workspace.conflicts,
        };
      }

      // =====================================================================
      // UI
      // =====================================================================
      const { useState, useEffect, useRef, useCallback } = React;

      function Spinner() { return <span className="spinner" />; }

      function LoginScreen({ auth, onSignedIn }) {
        const [state, setState] = useState(auth.state);

        useEffect(() => auth.onStateChange(setState), [auth]);

        useEffect(() => {
          if (state.status === AuthStatus.SignedIn) onSignedIn(state.user);
        }, [state]);

        const handleLogin = () => { auth.login().catch(() => {}); };

        return (
          <div className="card">
            <p className="title">Game Jam Planner</p>
            <p className="subtitle">Local-first planning, backed by your GitHub repo.</p>

            {state.status === AuthStatus.Error && (
              <div className="error-box">{state.error.message}</div>
            )}

            {(state.status === AuthStatus.SignedOut || state.status === AuthStatus.Error) && (
              <button className="btn-primary" onClick={handleLogin}>Login with GitHub</button>
            )}

            {state.status === AuthStatus.AwaitingDeviceCode && (
              <div className="status-line"><Spinner /> Requesting a login code…</div>
            )}

            {state.status === AuthStatus.AwaitingUserVerification && (
              <div>
                <div className="device-code">{state.userCode}</div>
                <p style={{ textAlign: "center", fontSize: 14, color: "var(--text-dim)" }}>
                  Go to{" "}
                  <a className="verify-link" href={state.verificationUriComplete} target="_blank" rel="noreferrer">
                    {state.verificationUri}
                  </a>{" "}
                  and enter this code.
                </p>
                <div className="status-line"><Spinner /> Waiting for you to approve access…</div>
              </div>
            )}

            {state.status === AuthStatus.Polling && (
              <div className="status-line"><Spinner /> Signing you in…</div>
            )}
          </div>
        );
      }

      function RepoList({ user, storage, onSelectRepo, onLogout }) {
        const [repos, setRepos] = useState(null);
        const [error, setError] = useState(null);

        useEffect(() => {
          storage.listUserRepos()
            .then((data) => setRepos(data))
            .catch((err) => setError(err.message));
        }, [storage]);

        return (
          <div className="card">
            <div className="user-row">
              <img src={user.avatarUrl} alt="" />
              <div>
                <div className="name">{user.name || user.login}</div>
                <div className="login">@{user.login}</div>
              </div>
              <button className="link-btn" onClick={onLogout}>Sign out</button>
            </div>

            <p className="title" style={{ fontSize: 16 }}>Choose a repository</p>
            <p className="subtitle">Pick where your game jam project lives.</p>

            {error && <div className="error-box">{error}</div>}

            {!repos && !error && <div className="status-line"><Spinner /> Loading repositories…</div>}

            {repos && repos.length === 0 && (
              <div className="empty-state">No repositories found for this account.</div>
            )}

            {repos && repos.length > 0 && (
              <ul className="repo-list">
                {repos.map((repo) => (
                  <li key={repo.id} className="repo-item" onClick={() => onSelectRepo(repo)}>
                    <div>
                      <div className="repo-name">{repo.full_name}</div>
                      <div className="repo-meta">{repo.private ? "Private" : "Public"} · updated {new Date(repo.updated_at).toLocaleDateString()}</div>
                    </div>
                    <span className="badge">{repo.permissions && repo.permissions.admin ? "admin" : repo.permissions && repo.permissions.push ? "write" : "read"}</span>
                  </li>
                ))}
              </ul>
            )}
          </div>
        );
      }

      function InitProjectForm({ repo, storage, onInitialized }) {
        const [name, setName] = useState(repo.name);
        const [description, setDescription] = useState("");
        const [jam, setJam] = useState("");
        const [theme, setTheme] = useState("");
        const [saving, setSaving] = useState(false);
        const [error, setError] = useState(null);

        const handleSubmit = async (e) => {
          e.preventDefault();
          setSaving(true);
          setError(null);
          try {
            const manifest = {
              id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now())),
              name,
              description,
              jam,
              theme,
              createdAt: new Date().toISOString(),
              storage: { kind: StorageProviderKind.GitHub, githubOwner: repo.owner, githubRepo: repo.name },
            };
            await storage.initProject(repo, manifest);
            onInitialized(manifest);
          } catch (err) {
            setError(err.message);
            setSaving(false);
          }
        };

        return (
          <div className="card">
            <p className="title" style={{ fontSize: 16 }}>Set up this repository</p>
            <p className="subtitle">No game jam project found in {repo.full_name} yet. Let's create one.</p>

            {error && <div className="error-box">{error}</div>}

            <form onSubmit={handleSubmit}>
              <div className="field">
                <label>Project name</label>
                <input value={name} onChange={(e) => setName(e.target.value)} required />
              </div>
              <div className="field">
                <label>Description</label>
                <textarea value={description} onChange={(e) => setDescription(e.target.value)} placeholder="What's the game about?" />
              </div>
              <div className="row-2">
                <div className="field">
                  <label>Jam</label>
                  <input value={jam} onChange={(e) => setJam(e.target.value)} placeholder="e.g. Ludum Dare 57" />
                </div>
                <div className="field">
                  <label>Theme</label>
                  <input value={theme} onChange={(e) => setTheme(e.target.value)} placeholder="e.g. Depths" />
                </div>
              </div>
              <button className="btn-primary" type="submit" disabled={saving}>
                {saving ? "Creating…" : "Initialize project"}
              </button>
            </form>
          </div>
        );
      }

      function statusLabel(status) {
        switch (status) {
          case CardStatus.Backlog: return "Backlog";
          case CardStatus.InProgress: return "In Progress";
          case CardStatus.Blocked: return "Blocked";
          case CardStatus.Done: return "Done";
          default: return status;
        }
      }

      function statusAccentClass(status) {
        switch (status) {
          case CardStatus.Backlog: return "board-card--backlog";
          case CardStatus.InProgress: return "board-card--in-progress";
          case CardStatus.Blocked: return "board-card--blocked";
          case CardStatus.Done: return "board-card--done";
          default: return "";
        }
      }

      /**
       * Thin wrapper over the browser's native SpeechRecognition API. No
       * dependency, no CDN — Chrome/Edge support it well; Firefox/Safari
       * support is patchy-to-absent, so `supported` gates the UI accordingly.
       * onFinalText is called incrementally with each finalized chunk (not
       * the whole transcript each time), so the caller appends rather than
       * replaces.
       */
      function useSpeechToText(onFinalText) {
        const RecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
        const supported = !!RecognitionAPI;

        const recognitionRef = useRef(null);
        const [listening, setListening] = useState(false);
        const [interimText, setInterimText] = useState("");
        const [error, setError] = useState(null);

        const start = () => {
          if (!supported || listening) return;
          const recognition = new RecognitionAPI();
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.lang = navigator.language || "en-US";

          recognition.onresult = (event) => {
            let finalChunk = "";
            let interimChunk = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
              const transcript = event.results[i][0].transcript;
              if (event.results[i].isFinal) finalChunk += transcript;
              else interimChunk += transcript;
            }
            if (finalChunk) onFinalText(finalChunk);
            setInterimText(interimChunk);
          };
          recognition.onerror = (event) => {
            setError(event.error === "not-allowed" ? "Microphone access denied." : `Speech recognition error: ${event.error}`);
            setListening(false);
          };
          recognition.onend = () => { setListening(false); setInterimText(""); };

          recognitionRef.current = recognition;
          setError(null);
          recognition.start();
          setListening(true);
        };

        const stop = () => { recognitionRef.current && recognitionRef.current.stop(); };

        // Stop any in-flight recognition if the component unmounts mid-dictation.
        useEffect(() => () => { recognitionRef.current && recognitionRef.current.stop(); }, []);

        return { supported, listening, interimText, error, start, stop };
      }

      function CardDetailModal({ card, collaborators, onSave, onDelete, onClose }) {
        const [title, setTitle] = useState(card.title);
        const [description, setDescription] = useState(card.description || "");
        const [status, setStatus] = useState(card.status);
        const [tagsText, setTagsText] = useState((card.tags || []).join(", "));
        const [assignee, setAssignee] = useState(card.assignee || "");

        const appendToDescription = useCallback((text) => {
          setDescription((prev) => (prev && !prev.endsWith(" ") ? prev + " " : prev) + text.trim());
        }, []);
        const speech = useSpeechToText(appendToDescription);

        const handleSave = () => {
          const tags = tagsText.split(",").map((t) => t.trim()).filter(Boolean);
          onSave({
            ...card,
            title: title.trim() || card.title,
            description,
            status,
            tags,
            assignee: assignee || null,
            updatedAt: new Date().toISOString(),
          });
        };

        const handleOverlayClick = (e) => { if (e.target === e.currentTarget) onClose(); };

        // If the current assignee isn't in the fetched collaborator list
        // (removed from the repo since assignment, or the list failed to
        // load), still show them as an option so they don't silently vanish.
        const assigneeOptions = card.assignee && !collaborators.includes(card.assignee)
          ? [card.assignee, ...collaborators]
          : collaborators;

        return (
          <div className="modal-overlay" onClick={handleOverlayClick}>
            <div className="modal-panel">
              <div className="modal-header">
                <input
                  value={title}
                  onChange={(e) => setTitle(e.target.value)}
                  style={{ font: "inherit", fontSize: 18, fontWeight: 600, background: "none", border: "none", color: "var(--text)", padding: 0, flex: 1 }}
                />
                <button className="modal-close" onClick={onClose} title="Close">×</button>
              </div>

              <div className="field">
                <div className="field-header">
                  <label>Description</label>
                  <button
                    type="button"
                    className={`mic-button${speech.listening ? " listening" : ""}`}
                    disabled={!speech.supported}
                    title={speech.supported ? (speech.listening ? "Stop dictation" : "Dictate description") : "Speech-to-text isn't supported in this browser (try Chrome or Edge)"}
                    onClick={() => (speech.listening ? speech.stop() : speech.start())}
                  >
                    🎤
                  </button>
                </div>
                <textarea value={description} onChange={(e) => setDescription(e.target.value)} placeholder="Details, acceptance criteria, notes…" style={{ minHeight: 100 }} />
                {speech.listening && (
                  <div className="interim-text">{speech.interimText || "Listening…"}</div>
                )}
                {speech.error && <div className="speech-error">{speech.error}</div>}
              </div>

              <div className="row-2">
                <div className="field">
                  <label>Status</label>
                  <select className="status-select" value={status} onChange={(e) => setStatus(e.target.value)}>
                    {Object.values(CardStatus).map((s) => (
                      <option key={s} value={s}>{statusLabel(s)}</option>
                    ))}
                  </select>
                </div>
                <div className="field">
                  <label>Assignee</label>
                  <select className="status-select" value={assignee} onChange={(e) => setAssignee(e.target.value)}>
                    <option value="">Unassigned</option>
                    {assigneeOptions.map((login) => (
                      <option key={login} value={login}>{login}</option>
                    ))}
                  </select>
                </div>
              </div>

              <div className="field">
                <label>Tags (comma-separated)</label>
                <input value={tagsText} onChange={(e) => setTagsText(e.target.value)} placeholder="e.g. art, audio, urgent" />
              </div>

              <div className="modal-footer">
                <button className="btn-danger-text" onClick={onDelete}>Delete card</button>
                <button className="btn-primary" onClick={handleSave}>Save changes</button>
              </div>
            </div>
          </div>
        );
      }

      function BoardView({ workspace, project, collaborators }) {
        const [newCardTitles, setNewCardTitles] = useState({});
        const [draggingCardId, setDraggingCardId] = useState(null);
        const [dragOverStatus, setDragOverStatus] = useState(null);
        const [selectedCardId, setSelectedCardId] = useState(null);

        const { board, cards } = project;
        const statuses = Object.values(CardStatus);
        const nextStatus = (status) => statuses[(statuses.indexOf(status) + 1) % statuses.length];
        const prevStatus = (status) => statuses[(statuses.indexOf(status) - 1 + statuses.length) % statuses.length];

        const handleAddCard = (status) => {
          const title = (newCardTitles[status] || "").trim();
          if (!title) return;
          workspace.addCard({ title, status });
          setNewCardTitles((prev) => ({ ...prev, [status]: "" }));
        };

        const handleDragStart = (e, cardId) => {
          setDraggingCardId(cardId);
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", cardId); // Firefox requires data to be set for drag to start
        };
        const handleDragEnd = () => { setDraggingCardId(null); setDragOverStatus(null); };
        const handleColumnDragOver = (e, status) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; setDragOverStatus(status); };
        const handleColumnDragLeave = (status) => { setDragOverStatus((current) => (current === status ? null : current)); };
        const handleColumnDrop = (e, status) => {
          e.preventDefault();
          const cardId = e.dataTransfer.getData("text/plain") || draggingCardId;
          if (cardId) workspace.moveCard(cardId, status);
          setDraggingCardId(null);
          setDragOverStatus(null);
        };

        const selectedCard = selectedCardId ? cards[selectedCardId] : null;

        return (
          <div>
            <div className="board-columns">
              {board.columns.map((col) => (
                <div
                  key={col.id}
                  className={`board-column${dragOverStatus === col.status ? " drag-over" : ""}`}
                  onDragOver={(e) => handleColumnDragOver(e, col.status)}
                  onDragLeave={() => handleColumnDragLeave(col.status)}
                  onDrop={(e) => handleColumnDrop(e, col.status)}
                >
                  <div className="board-column-header">
                    {statusLabel(col.status)}
                    <span className="board-column-count">{col.cardIds.length}</span>
                  </div>

                  <div className="board-column-cards">
                    {col.cardIds.map((cardId) => {
                      const card = cards[cardId];
                      if (!card) return null;
                      return (
                        <div
                          key={cardId}
                          className={`board-card ${statusAccentClass(card.status)}${draggingCardId === cardId ? " dragging" : ""}`}
                          draggable
                          onDragStart={(e) => handleDragStart(e, cardId)}
                          onDragEnd={handleDragEnd}
                          onClick={() => setSelectedCardId(cardId)}
                        >
                          {(card.tags && card.tags.length > 0) || card.assignee ? (
                            <div className="card-meta-row">
                              {(card.tags || []).map((tag) => <span key={tag} className="tag-pill">{tag}</span>)}
                              {card.assignee && <span className="avatar-badge" title={card.assignee}>{card.assignee.slice(0, 2).toUpperCase()}</span>}
                            </div>
                          ) : null}
                          <div className="board-card-title">{card.title}</div>
                          <div className="board-card-actions">
                            <button title="Move left" onClick={(e) => { e.stopPropagation(); workspace.moveCard(cardId, prevStatus(card.status)); }}>◀</button>
                            <button title="Move right" onClick={(e) => { e.stopPropagation(); workspace.moveCard(cardId, nextStatus(card.status)); }}>▶</button>
                            <button title="Delete" className="board-card-delete" onClick={(e) => { e.stopPropagation(); workspace.deleteCard(cardId); }}>×</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="add-card-row">
                    <input
                      placeholder="New card…"
                      value={newCardTitles[col.status] || ""}
                      onChange={(e) => setNewCardTitles((prev) => ({ ...prev, [col.status]: e.target.value }))}
                      onKeyDown={(e) => { if (e.key === "Enter") handleAddCard(col.status); }}
                    />
                    <button onClick={() => handleAddCard(col.status)}>+</button>
                  </div>
                </div>
              ))}
            </div>

            {selectedCard && (
              <CardDetailModal
                card={selectedCard}
                collaborators={collaborators}
                onClose={() => setSelectedCardId(null)}
                onSave={(updated) => { workspace.upsertCard(updated); setSelectedCardId(null); }}
                onDelete={() => { workspace.deleteCard(selectedCardId); setSelectedCardId(null); }}
              />
            )}
          </div>
        );
      }

      function Dashboard({ project, repo, storage }) {
        const [activity, setActivity] = useState(null);
        const [activityError, setActivityError] = useState(null);
        const [collaborators, setCollaborators] = useState(null);

        useEffect(() => {
          let cancelled = false;
          storage.listRecentActivity(repo)
            .then((items) => { if (!cancelled) setActivity(items); })
            .catch((err) => { if (!cancelled) setActivityError(err.message); });
          storage.listCollaboratorsWithPermissions(repo)
            .then((list) => { if (!cancelled) setCollaborators(list); })
            .catch(() => { if (!cancelled) setCollaborators([]); });
          return () => { cancelled = true; };
        }, [repo, storage]);

        const { manifest, board, cards } = project;
        const cardList = Object.values(cards);
        const totalCards = cardList.length;
        const doneCount = cardList.filter((c) => c.status === CardStatus.Done).length;
        const percentDone = totalCards > 0 ? Math.round((doneCount / totalCards) * 100) : 0;

        const countByStatus = (status) => cardList.filter((c) => c.status === status).length;

        return (
          <div>
            {manifest.description && (
              <p style={{ fontSize: 14, color: "var(--text-dim)", marginBottom: 20, maxWidth: 640 }}>{manifest.description}</p>
            )}

            <div className="dashboard-grid">
              <div className="dashboard-stat">
                <div className="stat-value">{totalCards}</div>
                <div className="stat-label">Total cards</div>
              </div>
              <div className="dashboard-stat">
                <div className="stat-value">{percentDone}%</div>
                <div className="stat-label">Done</div>
              </div>
              {Object.values(CardStatus).map((status) => (
                <div className="dashboard-stat" key={status}>
                  <div className="stat-value">{countByStatus(status)}</div>
                  <div className="stat-label">{statusLabel(status)}</div>
                </div>
              ))}
            </div>

            <div className="dashboard-columns">
              <div className="dashboard-panel">
                <h3>Team</h3>
                {collaborators === null && <div className="status-line"><Spinner /> Loading…</div>}
                {collaborators && collaborators.length === 0 && <div className="empty-state">No collaborators found.</div>}
                {collaborators && collaborators.map((c) => (
                  <div className="team-row" key={c.login}>
                    <img src={c.avatarUrl} alt="" />
                    <span className="team-login">{c.login}</span>
                    <span className="badge">{c.permission}</span>
                  </div>
                ))}
              </div>

              <div className="dashboard-panel">
                <h3>Recent activity</h3>
                {activityError && <div className="error-box">{activityError}</div>}
                {!activity && !activityError && <div className="status-line"><Spinner /> Loading…</div>}
                {activity && activity.length === 0 && <div className="empty-state">No commits to .gamejam/ yet.</div>}
                {activity && activity.map((item) => (
                  <div className="activity-item" key={item.sha}>
                    {item.authorAvatarUrl && <img src={item.authorAvatarUrl} alt="" />}
                    <div>
                      <div className="activity-message">{item.message}</div>
                      <div className="activity-meta">
                        {item.authorLogin}{item.date ? ` · ${new Date(item.date).toLocaleString()}` : ""}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      function TeamPage({ repo, storage }) {
        const [collaborators, setCollaborators] = useState(null);
        const [teamHandle, setTeamHandle] = useState(null);
        const [syncing, setSyncing] = useState(false);
        const [error, setError] = useState(null);
        const [lastSyncedAt, setLastSyncedAt] = useState(null);

        const load = useCallback(() => {
          setError(null);
          Promise.all([
            storage.listCollaboratorsWithPermissions(repo),
            storage.readTeam(repo),
          ]).then(([collabs, team]) => {
            setCollaborators(collabs);
            setTeamHandle(team.handle);
            setLastSyncedAt(team.data.length > 0 ? true : null);
          }).catch((err) => setError(err.message));
        }, [repo, storage]);

        useEffect(() => { load(); }, [load]);

        const handleSync = async () => {
          if (!collaborators) return;
          setSyncing(true);
          setError(null);
          try {
            const teamData = collaborators.map((c) => ({ login: c.login, role: c.permission }));
            const handle = await storage.writeTeam(repo, teamData, teamHandle);
            setTeamHandle(handle);
            setLastSyncedAt(true);
          } catch (err) {
            setError(err.message);
          } finally {
            setSyncing(false);
          }
        };

        return (
          <div className="dashboard-panel" style={{ maxWidth: 480 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <h3 style={{ margin: 0 }}>Team roster</h3>
              <button className="btn-primary" style={{ width: "auto", padding: "8px 16px" }} disabled={syncing || !collaborators} onClick={handleSync}>
                {syncing ? "Syncing…" : "Sync to team.json"}
              </button>
            </div>

            <p className="subtitle" style={{ marginBottom: 14 }}>
              Mirrors each collaborator's current GitHub permission level. GitHub is the source of truth — this is a
              persisted snapshot in team.json, refreshed whenever you hit Sync.
            </p>

            {error && <div className="error-box">{error}</div>}
            {!collaborators && !error && <div className="status-line"><Spinner /> Loading…</div>}
            {collaborators && collaborators.length === 0 && <div className="empty-state">No collaborators on this repository.</div>}
            {collaborators && collaborators.map((c) => (
              <div className="team-row" key={c.login}>
                <img src={c.avatarUrl} alt="" />
                <span className="team-login">{c.login}</span>
                <span className="badge">{c.permission}</span>
              </div>
            ))}
          </div>
        );
      }

      function ProjectShell({ repo, storage, onBack }) {
        const { loading, error, workspace, project, dirty, saving, conflicts } = useWorkspace(storage, repo);
        const [view, setView] = useState("dashboard"); // dashboard | board | team
        const [collaboratorLogins, setCollaboratorLogins] = useState([]);

        // Fetched once per repo for the board's assignee dropdown. Failure
        // here shouldn't block the board — just leaves the dropdown showing
        // "Unassigned" only, so errors are swallowed rather than surfaced.
        useEffect(() => {
          let cancelled = false;
          storage.listCollaborators(repo)
            .then((logins) => { if (!cancelled) setCollaboratorLogins(logins); })
            .catch(() => { if (!cancelled) setCollaboratorLogins([]); });
          return () => { cancelled = true; };
        }, [repo, storage]);

        // The board/dashboard need more horizontal room than the 560px
        // centered card layout used for login/repo screens. Widen #root only
        // while this component is mounted, restore it on unmount.
        useEffect(() => {
          const root = document.getElementById("root");
          const previous = root.style.maxWidth;
          root.style.maxWidth = "1100px";
          return () => { root.style.maxWidth = previous; };
        }, []);

        if (loading) {
          return (
            <div className="card" style={{ maxWidth: 560, margin: "0 auto" }}>
              <div className="status-line"><Spinner /> Loading project…</div>
            </div>
          );
        }

        if (error) {
          return (
            <div className="card" style={{ maxWidth: 560, margin: "0 auto" }}>
              <div className="error-box">{error}</div>
              <button onClick={onBack}>Back to repositories</button>
            </div>
          );
        }

        const { manifest } = project;

        return (
          <div>
            <div className="breadcrumb">
              <button onClick={onBack}>← Repositories</button>
              <span>{repo.full_name}</span>
            </div>

            <div className="board-topbar">
              <div>
                <p className="title" style={{ fontSize: 18, marginBottom: 2 }}>{manifest.name}</p>
                <p className="subtitle" style={{ marginBottom: 0 }}>
                  {manifest.jam || "No jam set"}{manifest.theme ? ` · ${manifest.theme}` : ""}
                </p>
              </div>
              <div className="board-topbar-actions">
                {conflicts.length > 0 && (
                  <div className="error-box" style={{ marginBottom: 0 }}>
                    {conflicts.length} file{conflicts.length > 1 ? "s" : ""} changed on GitHub since this loaded.{" "}
                    <button onClick={() => workspace.reloadDiscardingLocalChanges()}>Reload</button>
                  </div>
                )}
                {saving && <span className="status-line"><Spinner /> Saving…</span>}
                {!saving && dirty && <span className="status-line">Unsaved changes</span>}
                {!saving && !dirty && <span className="status-line">All changes saved</span>}
                <button className="btn-primary" disabled={!dirty || saving} onClick={() => workspace.save("Planning updates")}>
                  Save
                </button>
              </div>
            </div>

            <div className="view-tabs">
              <button className={view === "dashboard" ? "active" : ""} onClick={() => setView("dashboard")}>Dashboard</button>
              <button className={view === "board" ? "active" : ""} onClick={() => setView("board")}>Board</button>
              <button className={view === "team" ? "active" : ""} onClick={() => setView("team")}>Team</button>
            </div>

            {view === "dashboard" && <Dashboard project={project} repo={repo} storage={storage} />}
            {view === "board" && <BoardView workspace={workspace} project={project} collaborators={collaboratorLogins} />}
            {view === "team" && <TeamPage repo={repo} storage={storage} />}
          </div>
        );
      }


      function ProjectGate({ repo, storage, onBack }) {
        const [phase, setPhase] = useState("checking"); // checking | not-found | loaded | error
        const [error, setError] = useState(null);

        useEffect(() => {
          let cancelled = false;
          setPhase("checking");
          setError(null);
          storage.detectProject(repo)
            .then((exists) => { if (!cancelled) setPhase(exists ? "loaded" : "not-found"); })
            .catch((err) => { if (!cancelled) { setError(err.message); setPhase("error"); } });
          return () => { cancelled = true; };
        }, [repo, storage]);

        if (phase === "checking") {
          return (
            <div className="card" style={{ maxWidth: 560, margin: "0 auto" }}>
              <div className="status-line"><Spinner /> Checking {repo.full_name} for a game jam project…</div>
            </div>
          );
        }

        if (phase === "error") {
          return (
            <div className="card" style={{ maxWidth: 560, margin: "0 auto" }}>
              <div className="error-box">{error}</div>
              <button onClick={onBack}>Back to repositories</button>
            </div>
          );
        }

        if (phase === "not-found") {
          return <InitProjectForm repo={repo} storage={storage} onInitialized={() => setPhase("loaded")} />;
        }

        return <ProjectShell repo={repo} storage={storage} onBack={onBack} />;
      }

      function App() {
        const authRef = useRef(null);
        if (!authRef.current) authRef.current = new GitHubDeviceFlowAuth();
        const auth = authRef.current;

        const [user, setUser] = useState(null);
        const [restoring, setRestoring] = useState(true);
        const [selectedRepo, setSelectedRepo] = useState(null);

        useEffect(() => {
          auth.restoreSession().then((u) => { setUser(u); setRestoring(false); });
        }, []);

        const handleLogout = useCallback(() => { auth.logout(); setUser(null); setSelectedRepo(null); }, [auth]);

        if (restoring) {
          return <div className="card"><div className="status-line"><Spinner /> Checking for an existing session…</div></div>;
        }

        if (!user) {
          return <LoginScreen auth={auth} onSignedIn={setUser} />;
        }

        const storage = new GitHubStorage(user.accessToken);

        if (!selectedRepo) {
          return (
            <RepoList
              user={user}
              storage={storage}
              onLogout={handleLogout}
              onSelectRepo={(repo) => setSelectedRepo({
                // Normalize the raw GitHub API repo shape (repo.owner is an
                // object) into the plain { owner, name } string pair that
                // GitHubStorage's RepositoryRef expects.
                owner: repo.owner.login,
                name: repo.name,
                full_name: repo.full_name,
              })}
            />
          );
        }

        return <ProjectGate repo={selectedRepo} storage={storage} onBack={() => setSelectedRepo(null)} />;
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>

    <script>
      // Babel's automatic script-tag scanner defaults to the "automatic" JSX
      // runtime, which emits `import { jsx } from "react/jsx-runtime"` even
      // without data-type="module" — that import statement is what breaks on
      // file://. Transforming manually lets us force the classic runtime
      // (React.createElement calls, no imports) so this stays a plain script.
      const source = document.getElementById("app-source").textContent;
      const { code } = Babel.transform(source, {
        presets: [["react", { runtime: "classic" }]],
      });
      const script = document.createElement("script");
      script.textContent = code;
      document.body.appendChild(script);
    </script>
  </body>
</html>
