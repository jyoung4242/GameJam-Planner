<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Jam Planner</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --panel-border: #262b36;
        --text: #e7e9ee;
        --text-dim: #9aa2b1;
        --accent: #6ee7b7;
        --accent-dim: #2e5a4a;
        --danger: #f87171;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      /* Replace the current #root rule */
      #root {
        width: 100%;
        max-width: 520px; /* Default narrow layout for Auth, Repo Picker, Initializer */
        margin: 0 auto;
        transition: max-width 0.2s ease;
      }

      /* Add wide container rule for when the main app workspace is open */
      #root.app-workspace,
      .app-workspace {
        max-width: 1200px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 32px;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 4px;
      }
      .subtitle {
        color: var(--text-dim);
        font-size: 14px;
        margin: 0 0 24px;
      }
      button {
        font: inherit;
        cursor: pointer;
        border-radius: 8px;
        border: 1px solid var(--panel-border);
        background: #1f232c;
        color: var(--text);
        padding: 10px 16px;
        transition: border-color 0.15s;
      }
      button:hover {
        border-color: var(--accent);
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .btn-primary {
        background: var(--accent);
        color: #0f1115;
        border-color: var(--accent);
        font-weight: 600;
        width: 100%;
        padding: 12px 16px;
      }
      .btn-primary:hover {
        filter: brightness(1.05);
      }
      .device-code-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #0f1115;
        border: 1px dashed var(--panel-border);
        border-radius: 8px;
        padding: 12px 16px;
        margin: 20px 0;
      }

      .device-code {
        font-size: 32px;
        letter-spacing: 4px;
        font-weight: 700;
        text-align: center;
        color: var(--accent);
        margin: 0;
      }

      .copy-btn {
        background: #171a21;
        border: 1px solid var(--panel-border);
        color: var(--text-dim);
        padding: 8px 12px;
        font-size: 13px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.15s ease;
      }

      .copy-btn:hover {
        color: var(--text);
        border-color: var(--accent);
      }
      .status-line {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-dim);
        font-size: 13px;
        margin-top: 16px;
      }
      .spinner {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 2px solid var(--panel-border);
        border-top-color: var(--accent);
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .error-box {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid var(--danger);
        color: var(--danger);
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 13px;
        margin-bottom: 16px;

        list-style: none;
        margin: 0;
        padding: 0;

      .btn-danger-text {

    <script id="app-source" type="text/jsx">
      const CONFIG = {
        clientId: "Ov23liy7kjuppgIY5yU1",
        relayBaseUrl: "https://little-grass-e4c2gamejam-planner-auth-relay.jyoung4242.workers.dev",
        scope: "repo",
      };

      const STORAGE_KEYS = {
        ACCESS_TOKEN: "gjp_github_token",
        USER_DATA: "gjp_github_user",
      };

      const AuthStatus = {
        Idle: "IDLE",
        Starting: "STARTING",
        AwaitingUserVerification: "AWAITING_VERIFICATION",
        Polling: "POLLING",
        Success: "SUCCESS",
        Error: "ERROR",
      };

      class GitHubAuth {
        constructor(config) {
          this.config = config;
        }

        getStoredUser() {
          const token = localStorage.getItem(STORAGE_KEYS.ACCESS_TOKEN);
          const rawUser = localStorage.getItem(STORAGE_KEYS.USER_DATA);
          if (token && rawUser) {
            try {
              return { accessToken: token, profile: JSON.parse(rawUser) };
            } catch (e) {
              return null;
            }
          }
          return null;
        }

        saveUserSession(token, profile) {
          localStorage.setItem(STORAGE_KEYS.ACCESS_TOKEN, token);
          localStorage.setItem(STORAGE_KEYS.USER_DATA, JSON.stringify(profile));
        }

        logout() {
          localStorage.removeItem(STORAGE_KEYS.ACCESS_TOKEN);
          localStorage.removeItem(STORAGE_KEYS.USER_DATA);
        }

        async requestDeviceCode() {
          const res = await fetch(`${this.config.relayBaseUrl}/login/device/code`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              client_id: this.config.clientId,
              scope: this.config.scope,
            }),
          });
          if (!res.ok) throw new Error(`Device code request failed: ${res.status}`);
          return res.json();
        }

        async pollForAccessToken(deviceCode) {
          const res = await fetch(`${this.config.relayBaseUrl}/login/oauth/access_token`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              client_id: this.config.clientId,
              device_code: deviceCode,
              grant_type: "urn:ietf:params:oauth:grant-type:device_code",
            }),
          });
          if (!res.ok) throw new Error(`Access token request failed: ${res.status}`);
          return res.json();
        }

        async fetchUserProfile(accessToken) {
          const res = await fetch("https://api.github.com/user", {
            headers: { Authorization: `Bearer ${accessToken}` },
          });
          if (!res.ok) throw new Error(`Fetch user failed: ${res.status}`);
          return res.json();
        }
      }

      function useGitHubDeviceFlow(authService) {
        const [state, setState] = React.useState({
          status: AuthStatus.Idle,
          userCode: "",
          verificationUri: "",
          verificationUriComplete: "",
          error: null,
          user: authService.getStoredUser(),
        });

        const cancelRef = React.useRef(false);

        const startAuth = React.useCallback(async () => {
          cancelRef.current = false;
          setState(s => ({ ...s, status: AuthStatus.Starting, error: null }));

          try {
            const data = await authService.requestDeviceCode();
            if (cancelRef.current) return;

            const intervalMs = (data.interval || 5) * 1000;
            const expiresInMs = (data.expires_in || 900) * 1000;
            const deadline = Date.now() + expiresInMs;

            setState(s => ({
              ...s,
              status: AuthStatus.AwaitingUserVerification,
              userCode: data.user_code,
              verificationUri: data.verification_uri,
              verificationUriComplete: data.verification_uri_complete || data.verification_uri,
            }));

            while (Date.now() < deadline && !cancelRef.current) {
              await new Promise(r => setTimeout(r, intervalMs));
              if (cancelRef.current) return;

              try {
                const tokenData = await authService.pollForAccessToken(data.device_code);

                if (tokenData.access_token) {
                  const profile = await authService.fetchUserProfile(tokenData.access_token);
                  authService.saveUserSession(tokenData.access_token, profile);

                  if (!cancelRef.current) {
                    setState({
                      status: AuthStatus.Success,
                      userCode: "",
                      verificationUri: "",
                      verificationUriComplete: "",
                      error: null,
                      user: { accessToken: tokenData.access_token, profile },
                    });
                  }
                  return;
                }

                if (tokenData.error === "authorization_pending") continue;
                if (tokenData.error === "slow_down") {
                  await new Promise(r => setTimeout(r, 5000));
                  continue;
                }
                throw new Error(tokenData.error_description || tokenData.error || "Authentication failed");
              } catch (err) {
                if (err.message.includes("authorization_pending")) continue;
                throw err;
              }
            }

            if (!cancelRef.current) {
              throw new Error("Device code expired. Please try again.");
            }
          } catch (err) {
            if (!cancelRef.current) {
              setState(s => ({ ...s, status: AuthStatus.Error, error: err.message }));
            }
          }
        }, [authService]);

        const logout = React.useCallback(() => {
          cancelRef.current = true;
          authService.logout();
          setState({
            status: AuthStatus.Idle,
            userCode: "",
            verificationUri: "",
            verificationUriComplete: "",
            error: null,
            user: null,
          });
        }, [authService]);

        return { ...state, startAuth, logout };

      class GitHubStorage {
        constructor(token) {
          this.token = token;
        }

        authHeaders() {
          return {
            Authorization: `Bearer ${this.token}`,
            Accept: "application/vnd.github.v3+json",
          };
        }

        async listRepositories() {
          const res = await fetch("https://api.github.com/user/repos?sort=updated&per_page=100", {
            headers: this.authHeaders(),
          });
          if (!res.ok) throw new Error(`Failed to fetch repositories (${res.status})`);
          return res.json();
        }

        async getFile(repo, path) {
          const res = await fetch(`https://api.github.com/repos/${repo.owner}/${repo.name}/contents/${path}`, {
            headers: this.authHeaders(),
          });
          if (res.status === 404) return null;
          if (!res.ok) throw new Error(`Failed to fetch ${path} (${res.status})`);
          const data = await res.json();
          const text = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))));
          return { sha: data.sha, content: JSON.parse(text) };
        }

        async saveFile(repo, path, content, sha, message) {
          const jsonString = JSON.stringify(content, null, 2);
          const encoded = btoa(unescape(encodeURIComponent(jsonString)));
          const body = {
            message: message || `Update ${path}`,
            content: encoded,
            ...(sha ? { sha } : {}),
          };
          const res = await fetch(`https://api.github.com/repos/${repo.owner}/${repo.name}/contents/${path}`, {
            method: "PUT",
            headers: {
              ...this.authHeaders(),
              "Content-Type": "application/json",
            },
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.message || `Failed to save ${path} (${res.status})`);
          }
          return res.json();
        }

        async createRepository(name, isPrivate) {
          const res = await fetch("https://api.github.com/user/repos", {
            method: "POST",
            headers: {
              ...this.authHeaders(),
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              name,
              private: isPrivate,
              auto_init: true,
              description: "Game Jam Planner Project",
            }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.message || `Failed to create repository (${res.status})`);
          }
          return res.json();
        }

        async listCommits(repo) {
          const res = await fetch(`https://api.github.com/repos/${repo.owner}/${repo.name}/commits?path=.gamejam&per_page=20`, {
            headers: this.authHeaders(),
          });
          if (!res.ok) return [];
          return res.json();
        }

        async listCollaborators(repo) {
          const res = await fetch(`https://api.github.com/repos/${repo.owner}/${repo.name}/collaborators?per_page=100`, {
            headers: this.authHeaders(),
          });
          if (!res.ok) throw new Error(`Failed to list collaborators (${res.status})`);
          return res.json();
        }
      }

      function useWorkspace(storage, repo) {
        const [project, setProject] = React.useState(null);
        const [board, setBoard] = React.useState(null);
        const [shas, setShas] = React.useState({});
        const [loading, setLoading] = React.useState(true);
        const [saving, setSaving] = React.useState(false);
        const [error, setError] = React.useState(null);
        const [isDirty, setIsDirty] = React.useState(false);
        const [conflict, setConflict] = React.useState(false);

        const loadWorkspace = React.useCallback(async () => {
          setLoading(true);
          setError(null);
          try {
            const projFile = await storage.getFile(repo, ".gamejam/project.json");
            const boardFile = await storage.getFile(repo, ".gamejam/board.json");

            if (projFile && boardFile) {
              setProject(projFile.content);
              setBoard(boardFile.content);
              setShas({
                project: projFile.sha,
                board: boardFile.sha,
              });
            } else {
              setProject(null);
              setBoard(null);
            }
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        }, [storage, repo]);

        React.useEffect(() => {
          loadWorkspace();
        }, [loadWorkspace]);

        const initWorkspace = async details => {
          setLoading(true);
          setError(null);
          try {
            const initialProject = {
              name: details.name,
              description: details.description || "",
              jam: details.jam || "",
              theme: details.theme || "",
              created_at: new Date().toISOString(),
            };
            const initialBoard = {
              columns: [
                { id: "backlog", title: "Backlog" },
                { id: "in-progress", title: "In Progress" },
                { id: "blocked", title: "Blocked" },
                { id: "done", title: "Done" },
              ],
              cards: [
                {
                  id: "card-1",
                  title: "Setup Unity / Godot Project",
                  description: "Initialize repository and set up folder structure.",
                  status: "done",
                  tag: "Tech",
                },
                {
                  id: "card-2",
                  title: "Design Player Movement",
                  description: "Implement basic locomotion and jump feel.",
                  status: "in-progress",
                  tag: "Design",
                },
              ],
            };

            const projRes = await storage.saveFile(
              repo,
              ".gamejam/project.json",
              initialProject,
              null,
              "Initialize Game Jam project details",
            );
            const boardRes = await storage.saveFile(repo, ".gamejam/board.json", initialBoard, null, "Initialize Game Jam board");

            setProject(initialProject);
            setBoard(initialBoard);
            setShas({
              project: projRes.content.sha,
              board: boardRes.content.sha,
            });
            setIsDirty(false);
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        };

        const updateBoard = updater => {
          setBoard(prev => {
            const next = typeof updater === "function" ? updater(prev) : updater;
            setIsDirty(true);
            return next;
          });
        };

        const saveChanges = async () => {
          if (!isDirty || saving) return;
          setSaving(true);
          setError(null);
          setConflict(false);
          try {
            const boardRes = await storage.saveFile(repo, ".gamejam/board.json", board, shas.board, "Update board state");
            setShas(s => ({ ...s, board: boardRes.content.sha }));
            setIsDirty(false);
          } catch (err) {
            if (err.message.includes("409") || err.message.includes("sha")) {
              setConflict(true);
            } else {
              setError(err.message);
            }
          } finally {
            setSaving(false);
          }
        };

        return {
          project,
          board,
          loading,
          saving,
          error,
          isDirty,
          conflict,
          initWorkspace,
          updateBoard,
          saveChanges,
          reload: loadWorkspace,
        };
      }

      function SpeechInputButton({ onTranscript }) {
        const [listening, setListening] = React.useState(false);
        const [supported, setSupported] = React.useState(false);
        const [error, setError] = React.useState(null);
        const recognitionRef = React.useRef(null);

        React.useEffect(() => {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          if (SpeechRecognition) {
            setSupported(true);
            const rec = new SpeechRecognition();
            rec.continuous = false;
            rec.interimResults = false;
            rec.lang = "en-US";

            rec.onresult = event => {
              const text = event.results[0][0].transcript;
              onTranscript(text);
              setListening(false);
            };

            rec.onerror = evt => {
              setError(evt.error || "Speech error");
              setListening(false);
            };

            rec.onend = () => {
              setListening(false);
            };

            recognitionRef.current = rec;
          }
        }, [onTranscript]);

        const toggleListening = () => {
          if (!supported || !recognitionRef.current) return;
          setError(null);
          if (listening) {
            recognitionRef.current.stop();
            setListening(false);
          } else {
            try {
              recognitionRef.current.start();
              setListening(true);
            } catch (err) {
              setError("Could not start microphone");
            }
          }
        };

        if (!supported) return null;

        return (
          <div style={{ display: "inline-block" }}>
            <button
              type="button"
              className={`mic-button ${listening ? "listening" : ""}`}
              onClick={toggleListening}
              title={listening ? "Listening... click to stop" : "Speak text"}
            >
              🎤
            </button>
            {error && <div className="speech-error">{error}</div>}
          </div>
        );
      }

      function KanbanBoard({ workspace, collaborators }) {
        const { board, updateBoard } = workspace;
        const [editingCard, setEditingCard] = React.useState(null);
        const [isCreating, setIsCreating] = React.useState(false);
        const [targetColForNewCard, setTargetColForNewCard] = React.useState(null);
        const [draggedCardId, setDraggedCardId] = React.useState(null);
        const [dragOverColId, setDragOverColId] = React.useState(null);

        if (!board) return null;

        const handleSaveCard = cardData => {
          updateBoard(prev => {
            const exists = prev.cards.some(c => c.id === cardData.id);
            const nextCards = exists ? prev.cards.map(c => (c.id === cardData.id ? cardData : c)) : [...prev.cards, cardData];
            return { ...prev, cards: nextCards };
          });
          setEditingCard(null);
          setIsCreating(false);
        };

        const handleDeleteCard = cardId => {
          updateBoard(prev => ({
            ...prev,
            cards: prev.cards.filter(c => c.id !== cardId),
          }));
          setEditingCard(null);
        };

        const handleDragStart = (e, cardId) => {
          e.dataTransfer.setData("text/plain", cardId);
          e.dataTransfer.effectAllowed = "move";
          setDraggedCardId(cardId);
        };

        const handleDragEnd = () => {
          setDraggedCardId(null);
          setDragOverColId(null);
        };

        const handleDragOver = (e, colId) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          if (dragOverColId !== colId) {
            setDragOverColId(colId);
          }
        };

        const handleDragLeave = colId => {
          if (dragOverColId === colId) {
            setDragOverColId(null);
          }
        };

        const handleDrop = (e, colId) => {
          e.preventDefault();
          const cardId = e.dataTransfer.getData("text/plain") || draggedCardId;
          if (!cardId) return;

          updateBoard(prev => ({
            ...prev,
            cards: prev.cards.map(c => (c.id === cardId ? { ...c, status: colId } : c)),
          }));

          setDraggedCardId(null);
          setDragOverColId(null);
        };

        return (
          <div>
            <div className="board-topbar">
              <div>
                <h2 className="title" style={{ fontSize: "18px" }}>
                  Task Board
                </h2>
                <p className="subtitle" style={{ margin: 0 }}>
                  Drag cards between columns or click to edit.
                </p>
              </div>
              <div className="board-topbar-actions">
                <button
                  className="btn-primary"
                  onClick={() => {
                    setTargetColForNewCard(board.columns[0]?.id || "backlog");
                    setIsCreating(true);
                  }}
                >
                  + Add Card
                </button>
              </div>
            </div>

            <div className="board-columns">
              {board.columns.map(col => {
                const colCards = board.cards.filter(c => c.status === col.id);
                const isOver = dragOverColId === col.id;

                return (
                  <div
                    key={col.id}
                    className={`board-column ${isOver ? "drag-over" : ""}`}
                    onDragOver={e => handleDragOver(e, col.id)}
                    onDragLeave={() => handleDragLeave(col.id)}
                    onDrop={e => handleDrop(e, col.id)}
                  >
                    <div className="board-column-header">
                      <span>{col.title}</span>
                      <span className="board-column-count">{colCards.length}</span>
                    </div>

                    <div className="board-column-cards">
                      {colCards.map(card => {
                        const isDragging = draggedCardId === card.id;
                        return (
                          <div
                            key={card.id}
                            draggable
                            onDragStart={e => handleDragStart(e, card.id)}
                            onDragEnd={handleDragEnd}
                            onClick={() => setEditingCard(card)}
                            className={`board-card board-card--${card.status} ${isDragging ? "dragging" : ""}`}
                          >
                            {(card.tag || card.assignee) && (
                              <div className="card-meta-row">
                                {card.tag && <span className="tag-pill">{card.tag}</span>}
                                {card.assignee && (
                                  <div className="avatar-badge" title={`Assigned to ${card.assignee}`}>
                                    {card.assignee.substring(0, 2).toUpperCase()}
                                  </div>
                                )}
                              </div>
                            )}
                            <div className="board-card-title">{card.title}</div>
                          </div>
                        );
                      })}
                    </div>

                    <button
                      type="button"
                      style={{
                        width: "100%",
                        fontSize: "12px",
                        padding: "6px",
                        background: "transparent",
                        borderStyle: "dashed",
                      }}
                      onClick={() => {
                        setTargetColForNewCard(col.id);
                        setIsCreating(true);
                      }}
                    >
                      + Add Card
                    </button>
                  </div>
                );
              })}
            </div>

            {(editingCard || isCreating) && (
              <CardEditModal
                card={editingCard}
                columns={board.columns}
                collaborators={collaborators}
                onSave={handleSaveCard}
                onDelete={handleDeleteCard}
                onClose={() => {
                  setEditingCard(null);
                  setIsCreating(false);
                }}
              />
            )}
          </div>
        );
      }

            <div className="dashboard-columns">
              <div className="dashboard-panel">
                <h3>Recent Activity</h3>
                {commits.length === 0 ? (
                  <p className="empty-state">No recent activity found.</p>
                ) : (
                  <ul className="activity-list">
                    {commits.map(c => (
                      <li key={c.sha} className="activity-item">
                        <div className="activity-msg">{c.commit.message}</div>
                        <div className="activity-meta">
                          {c.commit.author.name} • {new Date(c.commit.author.date).toLocaleString()}
                        </div>
                      </li>
                    ))}
                  </ul>
                )}
              </div>

              <div className="dashboard-panel">
                <h3>Project Information</h3>
                <div style={{ fontSize: "13px", display: "flex", flexDirection: "column", gap: "10px" }}>
                  <div>
                    <span style={{ color: "var(--text-dim)" }}>Jam: </span>
                    <span>{project.jam || "Not set"}</span>
                  </div>
                  <div>
                    <span style={{ color: "var(--text-dim)" }}>Theme: </span>
                    <span>{project.theme || "Not set"}</span>
                  </div>
                  <div>
                    <span style={{ color: "var(--text-dim)" }}>Description: </span>
                    <span>{project.description || "No description provided."}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function TeamTab({ collaborators, repo }) {
        return (
          <div>
            <div style={{ marginBottom: "20px" }}>
              <h2 className="title" style={{ fontSize: "18px" }}>
                Team Collaborators
              </h2>
              <p className="subtitle" style={{ margin: 0 }}>
                People with access to the <code>{repo.full_name}</code> repository.
              </p>
            </div>

            {collaborators.length === 0 ? (
              <p className="empty-state">No collaborators found or loading permissions...</p>
            ) : (
              <div className="team-grid">
                {collaborators.map(c => {
                  const perm = c.permissions ? (c.permissions.admin ? "Admin" : c.permissions.push ? "Write" : "Read") : "Member";
                  return (
                    <div key={c.login} className="team-card">
                      <img src={c.avatar_url} alt={c.login} />
                      <div>
                        <div className="team-card-name">{c.login}</div>
                        <div className="team-card-perm">{perm} Access</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      }

      function InitWizard({ storage, repo, onInit }) {
        const [name, setName] = React.useState(repo.name);
        const [description, setDescription] = React.useState("");
        const [jam, setJam] = React.useState("");
        const [theme, setTheme] = React.useState("");
        const [submitting, setSubmitting] = React.useState(false);

        const handleSubmit = async e => {
          e.preventDefault();
          setSubmitting(true);
          await onInit({ name, description, jam, theme });
          setSubmitting(false);
        };

        return (
          <div className="card">
            <h1 className="title">Initialize Game Jam Planner</h1>
            <p className="subtitle">
              Repository <code>{repo.full_name}</code> doesn't have a planner setup yet.
            </p>

            <form onSubmit={handleSubmit}>
              <div className="field">
                <label>Game Title</label>
                <input type="text" value={name} onChange={e => setName(e.target.value)} required />
              </div>
              <div className="field">
                <label>Game Jam Name</label>
                <input type="text" value={jam} onChange={e => setJam(e.target.value)} placeholder="e.g. Ludum Dare 55" />
              </div>
              <div className="field">
                <label>Jam Theme</label>
                <input type="text" value={theme} onChange={e => setTheme(e.target.value)} placeholder="e.g. Summoning" />
              </div>
              <div className="field">
                <label>Short Pitch / Description</label>
                <textarea
                  value={description}
                  onChange={e => setDescription(e.target.value)}
                  placeholder="What is your game concept?"
                />
              </div>

              <button type="submit" className="btn-primary" disabled={submitting}>
                {submitting ? "Initializing .gamejam/ ..." : "Initialize Planner"}
              </button>
            </form>
          </div>
        );
      }

      function ProjectShell({ repo, storage, onBack }) {
        const workspace = useWorkspace(storage, repo);
        const [activeTab, setActiveTab] = React.useState("board"); // 'dashboard' | 'board' | 'team'
        const [commits, setCommits] = React.useState([]);
        const [collaborators, setCollaborators] = React.useState([]);

        React.useEffect(() => {
          if (workspace.project) {
            storage.listCommits(repo).then(setCommits).catch(console.error);
            storage.listCollaborators(repo).then(setCollaborators).catch(console.error);
          }
        }, [workspace.project, repo, storage]);

        if (workspace.loading) {
          return (
            <div className="card">
              <div className="status-line">
                <div className="spinner"></div>
                <span>Loading workspace from GitHub...</span>
              </div>
            </div>
          );
        }

        if (!workspace.project) {
          return <InitWizard storage={storage} repo={repo} onInit={workspace.initWorkspace} />;
        }

        return (
          <div className="app-workspace">
            <div className="breadcrumb">
              <button onClick={onBack}>&larr; Switch Repo</button>
              <span>/</span>
              <strong style={{ color: "var(--text)" }}>{workspace.project.name}</strong>
              <span style={{ fontSize: "11px", color: "var(--text-dim)", marginLeft: "auto" }}>{repo.full_name}</span>
            </div>

            {workspace.error && <div className="error-box">{workspace.error}</div>}

            {workspace.conflict && (
              <div className="error-box" style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span>Conflict detected! Remote changes exist. Reload to get latest state.</span>
                <button onClick={workspace.reload} style={{ fontSize: "12px", padding: "4px 8px" }}>
                  Reload Workspace
                </button>
              </div>
            )}

            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "16px" }}>
              <div className="view-tabs" style={{ marginBottom: 0, borderBottom: "none" }}>
                <button className={activeTab === "dashboard" ? "active" : ""} onClick={() => setActiveTab("dashboard")}>
                  Dashboard
                </button>
                <button className={activeTab === "board" ? "active" : ""} onClick={() => setActiveTab("board")}>
                  Board
                </button>
                <button className={activeTab === "team" ? "active" : ""} onClick={() => setActiveTab("team")}>
                  Team
                </button>
              </div>

              <div>
                <button
                  className="btn-primary"
                  style={{ width: "auto", padding: "8px 16px" }}
                  disabled={!workspace.isDirty || workspace.saving}
                  onClick={workspace.saveChanges}
                >
                  {workspace.saving ? "Saving..." : workspace.isDirty ? "Save Changes" : "Saved"}
                </button>
              </div>
            </div>

            {activeTab === "dashboard" && <ProjectDashboard workspace={workspace} commits={commits} collaborators={collaborators} />}
            {activeTab === "board" && <KanbanBoard workspace={workspace} collaborators={collaborators} />}
            {activeTab === "team" && <TeamTab collaborators={collaborators} repo={repo} />}
          </div>
        );
      }

      function ProjectGate({ repo, storage, onBack }) {
        return <ProjectShell repo={repo} storage={storage} onBack={onBack} />;
      }

      function App() {
        const auth = React.useMemo(() => new GitHubAuth(CONFIG), []);
        const [selectedRepo, setSelectedRepo] = React.useState(null);

        return (
          <GitHubAuthGate auth={auth}>
            {user => {
              const storage = new GitHubStorage(user.accessToken);

              if (!selectedRepo) {
                return (
                  <RepoPicker
                    storage={storage}
                    onLogout={() => auth.logout()}
                    onSelectRepo={repo =>
                      setSelectedRepo({
                        owner: repo.owner.login,
                        name: repo.name,
                        full_name: repo.full_name,
                      })
                    }
                  />
                );
              }

              return <ProjectGate repo={selectedRepo} storage={storage} onBack={() => setSelectedRepo(null)} />;
            }}
          </GitHubAuthGate>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>

    <script>
      const source = document.getElementById("app-source").textContent;
      const { code } = Babel.transform(source, {
        presets: [["react", { runtime: "classic" }]],
      });
      const script = document.createElement("script");
      script.textContent = code;
      document.body.appendChild(script);
    </script>
  </body>
</html>
